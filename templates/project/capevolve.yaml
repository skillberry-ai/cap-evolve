# cap-evolve run spec. The intake skill fills this by interviewing you; the
# orchestrate skill (or `cap-evolve run --spec`) reads it to sequence the pipeline.
# Values reference skills from the installed library (skills/_registry/manifest.json).
# Kept flat (no inline maps) so the zero-dependency reader can parse it.

# --- what to optimize -------------------------------------------------------
capabilities: [system-prompt]            # list of capability skills to optimize jointly
#   (e.g. [system-prompt, tools] to optimize a prompt AND tools together)
capability_path: seed_capability         # the artifact dir (a copy is optimized)
actions: [edit]                          # allowed edits (capability-specific)

# --- who proposes edits -----------------------------------------------------
optimizer_skill: mock                    # optimizer NAME (resolved by run-optimizer via optimizers/registry.yaml)
optimizer_model: ""                      # backend-specific (e.g. a claude model id)
optimizer_max_turns: 0                   # 0 = off; per-iteration WORK cap passed to the agent CLI
#   (claude-code → --max-turns N), bounding the cost/work of each optimization step
optimizer_usd_per_iter: 0.0              # 0 = off; per-iteration DOLLAR cap passed to the agent CLI
#   (claude-code → --max-budget-usd N, enforced by the CLI itself). Optimizers without a
#   native $ cap (e.g. ibm-bob) ignore it — bound those via optimizer_max_turns / max_optimizer_usd.

# --- how to iterate ---------------------------------------------------------
algorithm_skill: hill-climb              # algorithms/<skill>: hill-climb | gepa | skillopt | agent-optimize (agent-optimize REQUIRES orchestration_mode: agent)
algorithm_focus: all                     # hill-climb schedule: all | cyclic | hardest-first
orchestration_mode: deterministic        # deterministic (cap-evolve sequences the loop) | agent (the coding agent drives the loop via cap-evolve primitives, sealing with `cap-evolve finalize`)

# --- what context the optimizer gets (hill-climb) ---------------------------
# The per-iteration optimizer prompt is RENDERED from this template (intake authors it,
# customized per benchmark). Defaults to the scaffolded optimizer/INSTRUCTIONS.md.
optimizer_instructions_file: optimizer/INSTRUCTIONS.md
# Optional: path to the benchmark/runner source, surfaced to the optimizer as read-only
# context (so it can consult tools/scoring/task structure). Resolved project-relative.
runner_repo_path: ""
# Optional: supporting source files (e.g. the data model / types module the tools
# import) copied VERBATIM into the optimizer's ./guidance/sources/ so it can write
# correct tool code. List of paths, resolved project-relative; missing files tolerated.
capability_sources: []
# (The full trajectories of each eval are always copied verbatim into the optimizer's
#  working dir as ./trajectories/ — via your adapter's trajectories(split) hook, else
#  cap-evolve's own per-rollout JSON. No config needed.)

# --- data + splits ----------------------------------------------------------
dataset_source: tasks.jsonl              # file/dir, or "adapter" to use tasks()
split_seed: 0
split_train: 0.5
split_val: 0.25
split_test: 0.25
# Optional: pin the split explicitly instead of ratios. JSON file with
# {"train":[ids], "val":[ids], "test":[ids]}. Use to lock a benchmark's official
# split, or to fit on the whole set (train==val==test==all ids — no holdout).
split_ids_file: ""

# --- scoring ----------------------------------------------------------------
num_trials: 1

# --- metrics (display) ------------------------------------------------------
# The GATE always uses the PRIMARY metric only (= the scalar reward). Secondaries
# are shown in the dashboard/results but never affect accept/reject.
metrics_display: []          # names to show, e.g. [accuracy, latency_ms]; empty = just the primary reward
metric_primary: ""           # which name gates accept/reject (defaults to the reward if blank)
metric_directions: []        # parallel to metrics_display: higher | lower for each

# --- integrations / stop ----------------------------------------------------
github_integration: false    # mirror-only: mirror the algorithm's work items as issues + ship winner as PR (Closes #n); WHAT is mirrored is algorithm-specific (evo-graph=weaknesses)
stop_condition: ""           # agent-mode free-text halt rule, re-read each round (e.g. "stop when val acc >= 0.9 or 5 rounds")

# --- acceptance gate --------------------------------------------------------
gate_mode: paired                        # paired (recommended: per-task paired SE, same tasks both sides — banks real 1-task gains) | significant | strict | threshold | simplicity_tiebreak
gate_k_se: 1.0

# --- budget -----------------------------------------------------------------
# Run `cap-evolve estimate --spec capevolve.yaml` first to preview call counts + a
# $ range before spending. All caps below are hard stops; 0 = unlimited/off.
max_iterations: 10          # optimizer iterations (dominant cost knob)
stall: 2                    # stop after N consecutive rejects
max_metric_calls: 0         # 0 = unlimited; else stop after N runner evals
max_usd: 0.0                # 0 = unlimited; total $ cap (runner + optimizer + intake)
max_optimizer_usd: 0.0      # 0 = off; separate cap on optimizer spend alone

# --- iteration store (how each iteration is versioned for an inspectable process)
store: git                               # git (default) | copy | command
# store_commit_cmd: "npx skills publish {dir} -m {msg}"   # for store: command (e.g. a skills store)

# --- observability (optional; push events to external platforms) ---------------
# Each entry needs at minimum a "backend" key.  Extra keys are forwarded as
# kwargs to the observer class.  Built-in backends: null, mlflow, otel.
# Install extras:  pip install cap-evolve-core[mlflow]  or  [otel]  or  [observability]
# observers:
#   - backend: mlflow
#     experiment_name: cap-evolve/my-project
#     tracking_uri: http://localhost:5000
#   - backend: otel
#     service_name: cap-evolve
