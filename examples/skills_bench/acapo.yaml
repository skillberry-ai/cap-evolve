# skills-bench run spec — optimize a skill package with IBM Bob, evaluated by
# gpt-oss-120b running the skills-bench tasks. See README.md for full setup.
capabilities: [skill-package]
capability_path: seed_skill        # skills-root holding <skill-name>/SKILL.md
optimizer_skill: ibm-bob           # IBM Bob proposes the edits
optimizer_model: ""                # let Bob use its default model
algorithm_skill: all-at-once
dataset_source: adapter            # tasks() lists skills-bench tasks

num_trials: 2                      # average the binary task reward over 2 rollouts
gate_mode: significant
gate_k_se: 1.0

# 2 tasks: val = offer-letter-generator (the skill-sensitive task), test =
# powerlifting-coef-calc (held out, sealed). split_seed=0 pins this placement.
split_train: 0.0
split_val: 0.5
split_test: 0.5
split_seed: 0

max_iterations: 2
stall: 0
store: git
