# cap-evolve run spec. The intake skill fills this by interviewing you; the
# orchestrate skill (or `cap-evolve run --spec`) reads it to sequence the pipeline.
# Values reference skills from the installed library (skills/_registry/manifest.json).
# Kept flat (no inline maps) so the zero-dependency reader can parse it.

# --- what to optimize -------------------------------------------------------
capabilities: [system-prompt, tools]     # optimize the airline POLICY and the TOOLS jointly
capability_path: seed_capability         # the artifact dir (a copy is optimized)
actions: [edit]                          # allowed edits (capability-specific)
# Extra source files the tools import (tau2's airline data model / types), copied
# verbatim into the optimizer workdir (guidance/sources/) so it can write correct
# new-tool code against the real types. Resolved relative to this project dir.
capability_sources: [seed_capability/reference/data_model.py]

# --- who proposes edits -----------------------------------------------------
optimizer_skill: claude-code             # optimizer NAME (resolved by run-optimizer via optimizers/registry.yaml)
optimizer_model: claude-opus-4-6         # the optimizer's Claude model id
optimizer_max_turns: 400                 # generous per-iteration turn cap; the real ceiling is the $ cap below
optimizer_usd_per_iter: 40.0             # per-iteration $ cap, enforced by claude (--max-budget-usd N)

# The tau2 airline runner (agent + user sim) is openai/gpt-oss-120b via RITS — a mid-tier
# reader. Optimize the policy + tools FOR that reader (distinct from the opus optimizer).
target_model: gpt-oss-120b

# --- how to iterate ---------------------------------------------------------
algorithm_skill: hill-climb              # algorithms/<skill>
algorithm_focus: all                     # hill-climb schedule: all | cyclic | hardest-first

# --- data + splits ----------------------------------------------------------
dataset_source: adapter                  # use the adapter's tasks()
split_seed: 0
split_train: 0.5
split_val: 0.25
split_test: 0.25
# Pin the split explicitly: no-holdout fit (train==val==test==all 50 ids).
split_ids_file: split_ids.json

# --- scoring ----------------------------------------------------------------
num_trials: 10              # gpt-oss is stochastic; 10 trials → mean+stderr + pass^k

# --- acceptance gate --------------------------------------------------------
gate_mode: paired                        # paired (recommended) | significant | strict | threshold | simplicity_tiebreak
#   paired tests mean(per-task Δ) on the SAME tasks both sides → SE ~2-3x smaller than
#   the combined-SE `significant` test, so a real 1-task gain actually banks instead of
#   being lost in between-task variance. Falls back to significant when no per-task data.
gate_k_se: 0.2                           # accept gains that clear a 0.2·SE bar (on the paired SE)

# --- budget -----------------------------------------------------------------
# Run `cap-evolve estimate --spec capevolve.yaml` first to preview call counts + a
# $ range before spending. All caps below are hard stops; 0 = unlimited/off.
max_iterations: 10          # optimizer iterations (dominant cost knob)
stall: 0                    # run all max_iterations (do not early-stop on rejects)
max_metric_calls: 0         # 0 = unlimited; else stop after N runner evals
max_usd: 400.0              # total $ cap (runner + optimizer + intake)
max_optimizer_usd: 400.0    # cumulative optimizer-only $ cap (per-iteration cap is optimizer_usd_per_iter=40)

# --- iteration store (how each iteration is versioned for an inspectable process)
store: git                               # git (default) | copy | command
