reservation.payment_history.append(payment)"}]}], "cand_0014": [{"file": "policy/policy.md", "rows": [{"t": "hunk", "l": "@@ -15,9 +15,9 @@"}, {"t": "ctx", "l": " ## Critical Operational Rules"}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-1. **Execute IMMEDIATELY \u2014 no unnecessary questions, no delays.** When you have reservation IDs, call get_reservation_details right away. When you have user consent, call the write tool in your VERY NEXT response. Do not ask \"what is your user ID?\" if you already have reservation IDs to look up. Do not send another summary, do not ask \"are you sure?\", do not restate the plan. Every extra message risks the conversation ending without the action being completed. Be action-biased: look things up BEFORE asking questions, and ACT as soon as you have consent."}, {"t": "add", "l": "+1. **Execute IMMEDIATELY \u2014 the user's explicit request IS the confirmation.** When a user says \"cancel my reservation\", \"process the cancellations now\", \"go ahead and book it\", or any imperative action request \u2014 that IS their confirmation. Do NOT ask \"shall I proceed?\" or \"would you like me to...?\" when the user has already explicitly asked you to do it. Verify eligibility via tool calls, then EXECUTE the write in the same response. When you have reservation IDs, call get_reservation_details right away. Do not ask \"what is your user ID?\" if you already have reservation IDs. Every extra message risks the conversation ending without the action being completed. The user may stop at ANY moment \u2014 make tool calls BEFORE sending messages, and execute writes as soon as you have verified eligibility. Phrases like \"yes\", \"go ahead\", \"sure\", \"sounds good\", \"do it\", \"please process\" all count as confirmation \u2014 never re-ask."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 2. **Always verify claims against the database.** Never trust user-provided reservation IDs, membership tiers, booking times, or insurance status without checking via get_user_details and get_reservation_details. The user may misremember or provide incorrect info."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-3. **When a request applies to multiple reservations, check ALL of them.** Use get_all_reservation_details to fetch every reservation at once. Do not stop after checking a few \u2014 enumerate the complete list before acting or summarizing."}, {"t": "add", "l": "+3. **When a request applies to multiple reservations, check ALL of them.** Call get_user_details to find all reservation IDs, then call get_reservation_details for each one. Do not stop after checking a few \u2014 enumerate the complete list before acting or summarizing."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 4. **Compute flight duration from search_direct_flight results.** The tool returns scheduled_departure_time_est and scheduled_arrival_time_est \u2014 subtract to get duration. You always have this data available."}, {"t": "hunk", "l": "@@ -47,5 +47,5 @@"}, {"t": "ctx", "l": " 14. **Use passenger details from the user's profile.** When booking for passengers whose info is already in the system, call `get_user_details` and use the exact first_name, last_name, and dob from their `saved_passengers` list or from the user's own profile (for the user themselves, use their profile dob). Never ask the user for details you already have, and never invent or approximate a date of birth."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-15. **Honor user-stated cost/budget constraints \u2014 compute BEFORE writing.** If the user says \"only if under $X\", \"only proceed if the fee is less than $Y\", or any conditional, compute the actual cost FIRST using calculate or arithmetic. If the cost exceeds their stated limit, inform them and do NOT execute the write. The user's constraint is a hard gate, not a suggestion."}, {"t": "add", "l": "+15. **Honor user-stated cost/budget constraints \u2014 compute BEFORE writing, and STOP if user declines.** If the user says \"only if under $X\", \"only proceed if the fee is less than $Y\", or any conditional, compute the actual cost FIRST using calculate or arithmetic. If the cost exceeds their stated limit, inform them and do NOT execute the write. If you present a cost and the user says \"no\", \"too expensive\", declines, or rejects the option, the action is CANCELED \u2014 make NO writes. The correct outcome when the user declines is the ORIGINAL unchanged database state. Do not attempt alternative writes (cancel+rebook, partial changes) unless the user explicitly asks for them."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 16. **Never repeat a successful write.** Once a write tool (book_reservation, cancel_reservation, update_reservation_flights, update_reservation_baggages, update_reservation_passengers) returns successfully, that action is DONE. Do not call it again with the same or similar arguments. Move to the next step or confirm the result to the user."}, {"t": "hunk", "l": "@@ -53,5 +53,5 @@"}, {"t": "ctx", "l": " 17. **When reservation IDs are provided, look them up IMMEDIATELY.** Call get_reservation_details for each reservation ID the user gives you \u2014 you do NOT need user_id to look up a reservation. Do not ask \"what is your user ID?\" if you already have reservation IDs to work with. Look things up first, ask questions only if still needed after. The user may stop the conversation at any time, so make tool calls BEFORE sending messages."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-18. **Handle multiple independent requests \u2014 complete ALL doable work.** If the user makes several requests in one message (e.g., \"cancel reservation A and book a new flight\"), process each independently. If one request is impossible (e.g., cannot cancel, cannot remove a passenger), still complete ALL other requests that ARE within your capabilities. Never transfer to a human agent or end the conversation just because one sub-request is blocked \u2014 finish everything actionable first, then inform the user which parts succeeded and which cannot be done."}, {"t": "add", "l": "+18. **Handle ALL parts of multi-part requests \u2014 complete EVERY doable action.** If the user's request has multiple distinct actions (e.g., \"cancel flights over 4 hours AND upgrade flights under 3 hours\", or \"cancel reservation A and book a new flight\"), you MUST execute ALL parts. Process each action independently and systematically \u2014 do not stop after completing one type of action. If one sub-request is impossible, still complete ALL others that ARE within your capabilities. Never transfer or stop just because one part is blocked \u2014 finish everything actionable, then report which parts succeeded and which cannot be done."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 19. **After any write, state the EXACT dollar figure from the tool's returned payment_history.** When update_reservation_flights, cancel_reservation, or book_reservation returns, look at the LAST entry (or entries) in payment_history to get the actual charge or refund amount. State THAT number to the user \u2014 do NOT rely on your own pre-computed estimate, which may have arithmetic errors. The payment_history in the returned reservation is the ground truth for what was charged or refunded."}, {"t": "hunk", "l": "@@ -60,4 +60,10 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 21. **\"Fastest\" means shortest total elapsed time.** When the user asks for the \"fastest\" flight option, compute total elapsed time for each candidate (scheduled_arrival_time minus scheduled_departure_time, accounting for layovers). Pick the option with the shortest elapsed time. Use the calculate tool if needed. Do not pick a flight that departs earliest or arrives earliest \u2014 pick the one with the shortest journey duration."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+22. **Canonical lookup pattern: get_user_details FIRST, then get_reservation_details per ID.** When investigating a user's reservations: (1) call get_user_details to get the user's profile (membership, payment methods, reservation list), then (2) call get_reservation_details for EACH specific reservation ID you need to inspect. When the user provides specific reservation IDs, call get_reservation_details for each one individually \u2014 do NOT substitute get_all_reservation_details when you already have IDs. Use get_all_reservation_details ONLY when you need to discover reservations with no IDs known and no other way to identify them."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+23. **Always verify membership tier before computing baggage allowance.** Free checked bag counts depend on both membership level AND cabin class. Before stating, computing, or modifying baggage allowance, call get_user_details to confirm the user's membership tier. Never assume or guess the membership level."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+24. **Do NOT cancel unless cancellation is genuinely eligible AND requested.** Before calling cancel_reservation, you MUST verify: (a) the user explicitly wants to cancel (not just inquiring), AND (b) the reservation passes at least one eligibility criterion as shown by get_reservation_details's cancellation_eligibility field. If cancellation_eligibility says \"Not eligible,\" inform the user it cannot be cancelled \u2014 do NOT call cancel_reservation. The tool will reject ineligible cancellations, but you should not attempt them in the first place."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -272,6 +272,15 @@"}, {"t": "ctx", "l": "         total_payment = sum(payment.amount for payment in payment_methods)"}, {"t": "ctx", "l": "         if total_payment != total_price:"}, {"t": "del", "l": "-            raise ValueError("}, {"t": "del", "l": "-                f\"Payment amount does not add up, total price is {total_price}, but paid {total_payment}\""}, {"t": "add", "l": "+ ll cancel_reservation('{reservation_id}') then \""}, {"t": "del", "l": "-                    \"book_reservation with the desired flights/cabin. Option 2 is faster if the user \""}, {"t": "del", "l": "-                    \"wants a completely different itinerary or cabin.\""}, {"t": "add", "l": "+                    \"Basic economy flights cannot be changed at the same cabin. Two options: \""}, {"t": "add", "l": "+                    \"(1) UPGRADE CABIN FIRST: call update_reservation_flights with cabin='economy' or 'business' \""}, {"t": "add", "l": "+                    f\"and the SAME current flights [{current_flights_str}], then call AGAIN with new flights at the new cabin. \""}, {"t": "add", "l": "+                    f\"(2) CANCEL + REBOOK: call cancel_reservation('{reservation_id}') then \""}, {"t": "add", "l": "+                    \"book_reservation with the desired flights/cabin. Use option 2 when the user wants a \""}, {"t": "add", "l": "+                    \"completely different itinerary. Execute the chosen option immediately \u2014 do not just inform the user.\""}, {"t": "ctx", "l": "                 )"}, {"t": "ctx", "l": " "}]}], "cand_0015": [{"file": "policy/policy.md", "rows": [{"t": "hunk", "l": "@@ -35,5 +35,5 @@"}, {"t": "ctx", "l": " 8. **Cancellation eligibility \u2014 ALWAYS verify before cancelling.** Call get_reservation_details first and check the cancellation_eligibility field. A reservation can only be cancelled if: (a) booked within last 24 hours, OR (b) airline cancelled the flight, OR (c) it is a business class reservation, OR (d) the user has travel insurance AND the reason is covered (health/weather). If none apply, deny the cancellation."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights."}, {"t": "add", "l": "+9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, execute the two-step path: (1) call update_reservation_flights with cabin='economy' (or 'business') and the SAME current flights + a credit card/gift card payment_id for the fare difference, (2) then call update_reservation_flights again with the new flights at the new cabin. Alternatively, cancel_reservation + book_reservation is faster for completely different itineraries."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "hunk", "l": "@@ -60,4 +60,12 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 21. **\"Fastest\" means shortest total elapsed time.** When the user asks for the \"fastest\" flight option, compute total elapsed time for each candidate (scheduled_arrival_time minus scheduled_departure_time, accounting for layovers). Pick the option with the shortest elapsed time. Use the calculate tool if needed. Do not pick a flight that departs earliest or arrives earliest \u2014 pick the one with the shortest journey duration."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+22. **Before ANY write action, call get_reservation_details for that specific reservation.** The bulk `get_all_reservation_details` is for DISCOVERY only (finding which reservations a user has, matching a route/date). It does NOT substitute for verifying a specific reservation's eligibility before cancelling, modifying, or upgrading it. Always: get_all_reservation_details (if needed for discovery) \u2192 get_reservation_details(reservation_id) for each reservation you will modify \u2192 then execute the write."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+23. **Upgrading to business class enables FREE CANCELLATION.** Business class reservations are ALWAYS eligible for cancellation (no time limit, no insurance needed). If a user wants to cancel a basic_economy or economy reservation that is NOT otherwise eligible for cancellation, the upgrade-then-cancel path works: (1) upgrade cabin to business via update_reservation_flights (user pays the fare difference), (2) then cancel_reservation (now eligible because it's business class, full refund). Offer this path when the user wants to cancel but isn't eligible AND is willing to pay for the solution."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+24. **For fare differences on modifications (update_reservation_flights), use a credit card or gift card.** Travel certificates CANNOT be used as the payment_id for update_reservation_flights. When the user has multiple payment options, prefer credit card for fare differences unless the user specifies otherwise."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+25. **Baggage allowance communication \u2014 use the exact formula.** free_bags_per_passenger depends on membership level and cabin class (see the table in booking rules). Total free bags = free_bags_per_passenger \u00d7 number_of_passengers. When reporting to the user, state the single total number. Use the calculate tool to verify arithmetic."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -453,9 +453,10 @@"}, {"t": "ctx", "l": "     def get_all_reservation_details(self, user_id: str) -> list:"}, {"t": "ctx", "l": "         \"\"\""}, {"t": "del", "l": "-        Get details of ALL reservations for a user in one call. Use this when you need to"}, {"t": "del", "l": "-        review multiple or all reservations (e.g., user asks about 'all my flights', or you"}, {"t": "del", "l": "-        need to find which reservation matches a described route/date)."}, {"t": "del", "l": "-"}, {"t": "del", "l": "-        This is preferred over calling get_reservation_details multiple times."}, {"t": "add", "l": "+        Get a SUMMARY of all reservations for a user. Use for discovery: finding which"}, {"t": "add", "l": "+        reservations exist, matching a route/date, or listing all bookings."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        Returns basic reservation data ONLY. For full details including cancellation"}, {"t": "add", "l": "+        eligibility and modification options, call get_reservation_details(reservation_id)"}, {"t": "add", "l": "+        for each reservation you intend to act on."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         Args:"}, {"t": "hunk", "l": "@@ -463,6 +464,8 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         Returns:"}, {"t": "del", "l": "-            A list of reservation detail objects for every reservation the user has,"}, {"t": "del", "l": "-            each including cancellation_eligibility and has_flown_segments."}, {"t": "add", "l": "+            A list of reservation summaries (reservation_id, origin, destination, cabin,"}, {"t": "add", "l": "+            flights, passengers, insurance, status, created_at, total_baggages,"}, {"t": "add", "l": "+            nonfree_baggages, flight_type, payment_history). Does NOT include"}, {"t": "add", "l": "+            cancellation_eligibility \u2014 call get_reservation_details individually for that."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         Raises:"}, {"t": "hunk", "l": "@@ -473,5 +476,6 @@"}, {"t": "ctx", "l": "         for res_id in user.reservations:"}, {"t": "ctx", "l": "             try:"}, {"t": "del", "l": "-                results.append(self.get_reservation_details(res_id))"}, {"t": "add", "l": "+                reservation = self._get_reservation(res_id)"}, {"t": "add", "l": "+                results.append(reservation.model_dump())"}, {"t": "ctx", "l": "             except Exception as e:"}, {"t": "ctx", "l": "                 results.append({\"reservation_id\": res_id, \"error\": str(e)})"}, {"t": "hunk", "l": "@@ -738,4 +742,18 @@"}, {"t": "ctx", "l": "         total_price = 50 * max(0, nonfree_baggages - reservation.nonfree_baggages)"}, {"t": "ctx", "l": " "}, {"t": "add", "l": "+        # Reject certificates for baggage charges"}, {"t": "add", "l": "+        if total_price > 0 and payment_id in user.payment_methods:"}, {"t": "add", "l": "+            pm = user.payment_methods[payment_id]"}, {"t": "add", "l": "+            if pm.source == \"certificate\":"}, {"t": "add", "l": "+                available = sorted("}, {"t": "add", "l": "+                    k for k, v in user.payment_methods.items()"}, {"t": "add", "l": "+                    if v.source in (\"credit_card\", \"gift_card\")"}, {"t": "add", "l": "+                )"}, {"t": "add", "l": "+                raise ValueError("}, {"t": "add", "l": "+                    f\"Cannot use certificate '{payment_id}' to pay baggage fee of ${total_price}. \""}, {"t": "add", "l": "+                    \"Certificates cannot be used for baggage charges. \""}, {"t": "add", "l": "+                    f\"Use a credit card or gift card instead. Available: {available}\""}, {"t": "add", "l": "+                )"}, {"t": "add", "l": "+"}, {"t": "ctx", "l": "         # Create payment"}, {"t": "ctx", "l": "         payment = self._payment_for_update(user, payment_id, total_price)"}, {"t": "hunk", "l": "@@ -904,4 +922,18 @@"}, {"t": "ctx", "l": "         )"}, {"t": "ctx", "l": " "}, {"t": "add", "l": "+        # Reject certificates for charges (they cannot be used for fare differences)"}, {"t": "add", "l": "+        if total_price > 0 and payment_id in user.payment_methods:"}, {"t": "add", "l": "+            pm = user.payment_methods[payment_id]"}, {"t": "add", "l": "+            if pm.source == \"certificate\":"}, {"t": "add", "l": "+                available = sorted("}, {"t": "add", "l": "+                    k for k, v in user.payment_methods.items()"}, {"t": "add", "l": "+                    if v.source in (\"credit_card\", \"gift_card\")"}, {"t": "add", "l": "+                )"}, {"t": "add", "l": "+                raise ValueError("}, {"t": "add", "l": "+                    f\"Cannot use certificate '{payment_id}' to pay fare difference of ${total_price}. \""}, {"t": "add", "l": "+                    \"Certificates cannot be used for upgrade/modification charges. \""}, {"t": "add", "l": "+                    f\"Use a credit card or gift card instead. Available: {available}\""}, {"t": "add", "l": "+                )"}, {"t": "add", "l": "+"}, {"t": "ctx", "l": "         # Create payment \u2014 wrap with actionable error showing exact price difference"}, {"t": "ctx", "l": "         try:"}]}]}}</script>
<script>
const DATA = JSON.parse(document.getElementById('run-data').textContent);
const G = DATA.graph, S = DATA.summary, DIFFS = DATA.diffs||{};
const $ = (t,a={},...k)=>{const e=document.createElement(t);for(const[p,v]of Object.entries(a)){
  if(p==='html')e.innerHTML=v;else if(p==='text')e.textContent=v;else e.setAttribute(p,v);}
  for(const c of k)if(c!=null)e.append(c);return e;};
const NS='http://www.w3.org/2000/svg';
const svg=(t,a={})=>{const e=document.createElementNS(NS,t);for(const[p,v]of Object.entries(a))e.setAttribute(p,v);return e;};
const fmt=v=>v==null?'—':(+v).toFixed(3);
const main=document.getElementById('main'), tip=document.getElementById('tip');
document.getElementById('hdr').textContent =
  `${S.run_id} · ${S.counts.total} candidates · ${S.test_sealed?'test sealed':'no holdout yet'}`;
function showTip(e,txt){tip.textContent=txt;tip.style.display='block';
  tip.style.left=Math.min(e.clientX+14,innerWidth-330)+'px';tip.style.top=(e.clientY+14)+'px';}
function hideTip(){tip.style.display='none';}
function sec(title){const s=$('section');s.append($('h2',{text:title}));main.append(s);return s;}

/* ---------- 1. KPI strip ---------- */
(function(){
  const s=sec('Summary'); const g=$('div',{class:'kpis'});
  const dpct=S.delta_pct!=null?`${S.delta_pct>0?'+':''}${S.delta_pct}%`:
            (S.delta_abs!=null?`${S.delta_abs>0?'+':''}${S.delta_abs.toFixed(3)}`:'—');
  const kp=(l,v,cls='',s2='')=>{const k=$('div',{class:'kpi'});k.append($('div',{class:'l',text:l}),
    $('div',{class:'v '+cls,text:v}));if(s2)k.append($('div',{class:'s',text:s2}));return k;};
  const c=S.counts, cost=S.cost;
  g.append(
    kp('best val',fmt(S.best_val),'champ',S.best_id),
    kp('baseline',fmt(S.baseline_val)),
    kp('Δ vs baseline',dpct,(S.delta_abs>0?'ok':'')),
    kp('held-out test',fmt(S.test_reward),'',S.test_sealed?'sealed once':'not finalized'),
    kp('candidates',c.total,'',`${c.accepted}✓ ${c.rejected}✗ ${c.failed}⚠`),
    kp('frontier',S.frontier),
    kp('wall clock',`${S.wall_clock_seconds}s`,'',`opt ${S.optimizer_seconds}s · run ${S.runner_seconds}s`),
    kp('cost',`$${cost.total_usd.toFixed(4)}`,'',`opt $${cost.optimizer_usd.toFixed(4)} · run $${cost.runner_usd.toFixed(4)}`),
    kp('tokens',S.tokens.toLocaleString())
  );
  s.append(g);
})();

/* ---------- 1b. Narrative summary ---------- */
(function(){
  const c=S.counts, parts=[];
  if(S.baseline_val!=null&&S.best_val!=null){
    const d=((S.best_val-S.baseline_val)*100).toFixed(1);
    parts.push(`Starting from a ${(S.baseline_val*100).toFixed(1)}% baseline, the search reached `+
      `${(S.best_val*100).toFixed(1)}% (+${d} points)`);
  }
  parts.push(`after ${c.accepted+c.rejected} iterations (${c.accepted} accepted, ${c.rejected} rejected)`);
  if(S.test_reward!=null)parts.push(`The best candidate scored ${(S.test_reward*100).toFixed(1)}% on the sealed test set`);
  if(!parts.length)return;
  const s=sec('Narrative'); s.append($('p',{class:'muted',text:parts.join('. ')+'.'}));
})();

/* ---------- 1c. Phases timeline ---------- */
(function(){
  const c=S.counts, total=c.total, evaluated=c.accepted+c.rejected;
  const hasBase=S.baseline_val!=null, finalized=(S.test_reward!=null)||S.test_sealed;
  const D=b=>b?'done':'pending';
  const phases=[
    {nm:'Intake',st:D(total>0||hasBase),d:'Interview + scaffold project, adapter, seed.'},
    {nm:'Implement & check',st:D(total>0||hasBase),d:'Hard gate before any budget is spent.'},
    {nm:'Baseline',st:D(hasBase),d:`Freeze splits; seed val ${fmt(S.baseline_val)}.`},
    {nm:'Optimize'+(S.algorithm?' · '+S.algorithm:''),st:finalized?'done':(hasBase?'active':'pending'),
     d:`${evaluated} iters · ${c.accepted} accepted · best ${fmt(S.best_val)}.`},
    {nm:'Finalize',st:D(finalized),d:`Sealed test ${fmt(S.test_reward)}.`},
    {nm:'Report',st:D(finalized),d:'This dashboard.'},
  ];
  const s=sec('Pipeline phases'); const g=$('div',{class:'phases'});
  for(const p of phases){const e=$('div',{class:'phase '+p.st});
    e.append($('div',{class:'nm',text:p.nm}),$('div',{class:'st',text:p.st}),$('div',{class:'d',text:p.d}));
    g.append(e);}
  s.append(g);
})();

/* ---------- 1d. What not to try (deduped dead-ends) ---------- */
(function(){
  const norm=r=>(r||'rejected').replace(/-?\d+\.\d+/g,'N').replace(/-?\d+/g,'N').trim();
  const map=new Map();
  for(const n of G.nodes){ if(n.status!=='rejected')continue;
    const k=norm(n.reason); const cur=map.get(k)||{reason:k,count:0,ex:[]};
    cur.count++; if(cur.ex.length<3)cur.ex.push(n.id); map.set(k,cur);}
  const ends=[...map.values()].sort((a,b)=>b.count-a.count);
  if(!ends.length)return;
  const s=sec('What not to try — dead ends');
  for(const d of ends){const e=$('div',{class:'dead'});
    if(d.count>1)e.append($('span',{class:'x',text:'×'+d.count}));
    e.append($('div',{class:'muted',text:d.ex.join(', ')}),$('div',{text:d.reason}));
    s.append(e);}
})();

/* ---------- 2. Cumulative-best stair over per-iteration scatter ---------- */
(function(){
  const pts=G.nodes.filter(n=>n.iteration!=null&&n.best_so_far!=null)
    .sort((a,b)=>a.iteration-b.iteration);
  if(pts.length<2)return;
  const s=sec('Score over iterations — cumulative best');
  const W=1080,H=300,m={l:46,r:16,t:16,b:30};
  const xs=pts.map(p=>p.iteration), allv=pts.flatMap(p=>[p.best_so_far,p.val].filter(v=>v!=null));
  const xmin=Math.min(...xs),xmax=Math.max(...xs)||1,vmin=Math.min(...allv,0),vmax=Math.max(...allv,1);
  const X=i=>m.l+(i-xmin)/((xmax-xmin)||1)*(W-m.l-m.r);
  const Y=v=>H-m.b-(v-vmin)/((vmax-vmin)||1)*(H-m.t-m.b);
  const el=svg('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  for(let g2=0;g2<=4;g2++){const v=vmin+(vmax-vmin)*g2/4;
    el.append(svg('line',{x1:m.l,x2:W-m.r,y1:Y(v),y2:Y(v),stroke:'#2b333d','stroke-width':1}));
    el.append(svg('text',{x:6,y:Y(v)+4,fill:'#8b949e','font-size':10,'text-content':''})).textContent=v.toFixed(2);}
  // stair polyline of running best
  let d='';let prevY=null;
  pts.forEach((p,i)=>{const x=X(p.iteration),y=Y(p.best_so_far);
    if(i===0)d=`M${x},${y}`;else d+=` L${x},${prevY} L${x},${y}`;prevY=y;});
  el.append(svg('path',{d,fill:'none',stroke:'#3fb950','stroke-width':2}));
  // record-holder rings + per-iter scatter
  let rec=-1;
  pts.forEach(p=>{
    if(p.val!=null){const col=p.status==='accepted'?'#3fb950':p.status==='failed'?'#f85149':'#d29922';
      const c=svg('circle',{cx:X(p.iteration),cy:Y(p.val),r:4,fill:col,'fill-opacity':.85,stroke:'#0e1116'});
      const dpar=p.parent_val!=null?(p.val-p.parent_val).toFixed(3):'—';
      c.addEventListener('mousemove',e=>showTip(e,`${p.id}\n${p.status}  val=${fmt(p.val)}\nΔ parent=${dpar}\niter ${p.iteration}`));
      c.addEventListener('mouseleave',hideTip);el.append(c);}
    if(p.best_so_far>rec){rec=p.best_so_far;
      el.append(svg('circle',{cx:X(p.iteration),cy:Y(p.best_so_far),r:7,fill:'none',stroke:'#4493f8','stroke-width':1.5}));}
  });
  // champion star + label
  const champ=pts.reduce((a,b)=>(b.best_so_far>=a.best_so_far?b:a),pts[0]);
  const cx=X(champ.iteration),cy=Y(champ.best_so_far);
  el.append(svg('path',{d:starPath(cx,cy-12,7,3),fill:'#f0d040',stroke:'#0e1116'}));
  el.append(svg('text',{x:cx+10,y:cy-8,fill:'#e6edf3','font-size':12})).textContent=fmt(champ.best_so_far);
  s.append(el);
  s.append($('div',{class:'legend',html:
    '<span><i style="background:#3fb950"></i>running best / accept</span>'+
    '<span><i style="background:#d29922"></i>rejected</span>'+
    '<span><i style="background:#f85149"></i>failed</span>'+
    '<span><i style="background:#4493f8;border-radius:50%"></i>record-holder ring</span>'}));
  function starPath(cx,cy,R,r){let p='';for(let i=0;i<10;i++){const ang=Math.PI/5*i-Math.PI/2;
    const rad=i%2?r:R;p+=(i?'L':'M')+(cx+rad*Math.cos(ang))+','+(cy+rad*Math.sin(ang));}return p+'Z';}
})();

/* ---------- 3. tasks × iterations pass/fail heatmap ---------- */
(function(){
  const tasks=S.tasks||[];
  const iters=G.nodes.filter(n=>Object.keys(n.per_task||{}).length).sort((a,b)=>a.iteration-b.iteration);
  if(!tasks.length||iters.length<1)return;
  const s=sec('Per-task pass/fail across iterations');
  // sort rows worst-first by mean reward
  const meanFor=t=>{let sum=0,n=0;iters.forEach(it=>{if(it.per_task[t]!=null){sum+=it.per_task[t];n++;}});return n?sum/n:0;};
  const rows=[...tasks].sort((a,b)=>meanFor(a)-meanFor(b));
  const cw=Math.max(10,Math.min(26,Math.floor(1000/iters.length))),ch=16,labW=120;
  const W=labW+iters.length*cw+10,H=rows.length*ch+24;
  const el=svg('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H,class:'heat'});
  iters.forEach((it,j)=>{el.append(svg('text',{x:labW+j*cw+cw/2,y:12,'text-anchor':'middle'})).textContent=it.iteration;});
  rows.forEach((t,i)=>{
    el.append(svg('text',{x:labW-6,y:24+i*ch+11,'text-anchor':'end'})).textContent=t.length>16?t.slice(0,15)+'…':t;
    iters.forEach((it,j)=>{
      const v=it.per_task[t];
      const col=v==null?'#21262d':v>=0.999?'#2ea043':v<=0.001?'#7d2622':'#9e6a1a';
      const rect=svg('rect',{x:labW+j*cw,y:24+i*ch,width:cw-1.5,height:ch-1.5,rx:2,fill:col});
      const fb=(it.feedback&&it.feedback[t])||'';
      rect.addEventListener('mousemove',e=>showTip(e,`${t} @ iter ${it.iteration} (${it.id})\nreward=${v==null?'—':v.toFixed(3)}\n${fb.slice(0,180)}`));
      rect.addEventListener('mouseleave',hideTip);
      el.append(rect);
    });
  });
  s.append(el);
  s.append($('div',{class:'legend',html:
    '<span><i style="background:#2ea043"></i>pass</span><span><i style="background:#7d2622"></i>fail</span>'+
    '<span><i style="background:#9e6a1a"></i>partial</span><span><i style="background:#21262d"></i>not run</span>'+
    '<span class="muted">rows sorted worst-first · hover a cell for feedback</span>'}));
})();

/* ---------- 4. Per-iteration diff view ---------- */
(function(){
  const ids=Object.keys(DIFFS); if(!ids.length)return;
  const s=sec('Diff vs parent');
  const bar=$('div',{class:'row'});
  const sel=$('select'); ids.forEach(id=>sel.append($('option',{value:id,text:id})));
  const mode=$('select'); mode.append($('option',{value:'unified',text:'unified'}),$('option',{value:'split',text:'split'}));
  bar.append($('span',{class:'muted',text:'candidate '}),sel,$('span',{class:'muted',text:' view '}),mode);
  s.append(bar);
  const out=$('div',{class:'diff'}); s.append(out);
  function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function render(){
    const id=sel.value, files=DIFFS[id]||[], split=mode.value==='split';
    out.innerHTML='';
    files.forEach(f=>{
      out.append($('div',{class:'file',text:'━ '+f.file}));
      if(!split){
        f.rows.forEach(r=>out.append($('div',{class:r.t,text:r.l})));
      }else{
        const tbl=$('div'); f.rows.forEach(r=>{
          if(r.t==='hunk'){tbl.append($('div',{class:'hunk',text:r.l}));return;}
          const cls=r.t; const line=$('div',{class:cls});
          line.textContent=(r.t==='del'?'◀ ':r.t==='add'?'▶ ':'  ')+r.l.slice(1);
          tbl.append(line);
        }); out.append(tbl);
      }
    });
  }
  sel.addEventListener('change',render); mode.addEventListener('change',render); render();
})();

/* ---------- 5. Lineage tree (DAG, best-spine highlighted) ---------- */
(function(){
  const nodes=G.nodes, byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  if(nodes.length<2)return;
  const s=sec('Lineage');
  // depth = distance from root; assign columns by BFS order within depth
  const depth={}; const order=[];
  (function walk(id,d){const n=byId[id];if(!n||depth[id]!=null)return;depth[id]=d;order.push(id);
    (n.children||[]).forEach(c=>walk(c,d+1));})('seed',0);
  nodes.forEach(n=>{if(depth[n.id]==null){depth[n.id]=0;order.push(n.id);}});
  const cols={}; const maxd=Math.max(...Object.values(depth));
  const byDepth={}; order.forEach(id=>{const d=depth[id];(byDepth[d]=byDepth[d]||[]).push(id);});
  const pos={};
  for(let d=0;d<=maxd;d++){(byDepth[d]||[]).forEach((id,i)=>pos[id]={x:60+d*150,y:40+i*46});}
  // best-lineage spine
  const spine=new Set(); let cur=S.best_id;
  while(cur){spine.add(cur);cur=byId[cur]?byId[cur].parent:null;}
  const W=80+( maxd+1)*150, H=40+Math.max(...Object.values(byDepth).map(a=>a.length))*46+20;
  const el=svg('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  nodes.forEach(n=>{const p=pos[n.id];if(!p)return;
    const parents=[n.parent,...(n.merge_of||[])].filter(x=>x&&pos[x]);
    parents.forEach(pp=>{const a=pos[pp];const onSpine=spine.has(n.id)&&spine.has(pp);
      el.append(svg('path',{d:`M${a.x+14},${a.y} C${(a.x+p.x)/2},${a.y} ${(a.x+p.x)/2},${p.y} ${p.x-14},${p.y}`,
        fill:'none',stroke:onSpine?'#f0d040':'#3a434d','stroke-width':onSpine?2.5:1.2}));});
  });
  nodes.forEach(n=>{const p=pos[n.id];if(!p)return;
    const col=n.status==='accepted'?'#3fb950':n.status==='rejected'?'#d29922':n.status==='failed'?'#f85149':'#4493f8';
    const c=svg('circle',{cx:p.x,cy:p.y,r:n.id===S.best_id?9:6,fill:col,
      stroke:spine.has(n.id)?'#f0d040':'#0e1116','stroke-width':spine.has(n.id)?2:1});
    c.addEventListener('mousemove',e=>showTip(e,`${n.id}\n${n.status}  val=${fmt(n.val)}\n${n.reason||''}`));
    c.addEventListener('mouseleave',hideTip); el.append(c);
    el.append(svg('text',{x:p.x+12,y:p.y+4,fill:'#8b949e','font-size':10})).textContent=n.id;
  });
  s.append(el);
  s.append($('div',{class:'legend',html:'<span><i style="background:#f0d040"></i>best lineage spine</span>'+
    '<span class="muted">merges shown as multi-parent edges</span>'}));
})();

/* ---------- 6. Cost / tokens / latency ---------- */
(function(){
  const pts=G.nodes.filter(n=>n.iteration).sort((a,b)=>a.iteration-b.iteration);
  if(!pts.length)return;
  const s=sec('Cost · tokens · latency (optimizer vs runner)');
  const W=1080,H=240,m={l:46,r:16,t:14,b:28},n=pts.length;
  const bw=Math.max(6,Math.min(40,(W-m.l-m.r)/n-6));
  const maxSec=Math.max(...pts.map(p=>(p.optimizer_seconds||0)+(p.runner_seconds||0)),0.001);
  const el=svg('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  // stacked bars: optimizer (blue) + runner (green) seconds; cumulative cost line
  let cum=0; const costMax=Math.max(S.cost.total_usd,0.0001);
  pts.forEach((p,i)=>{const x=m.l+i*((W-m.l-m.r)/n)+3;
    const os=(p.optimizer_seconds||0)/maxSec*(H-m.t-m.b);
    const rs=(p.runner_seconds||0)/maxSec*(H-m.t-m.b);
    el.append(svg('rect',{x,y:H-m.b-rs,width:bw,height:rs,fill:'#3fb950'})).addEventListener('mousemove',()=>{});
    el.append(svg('rect',{x,y:H-m.b-rs-os,width:bw,height:os,fill:'#4493f8'}));
    const bar=svg('rect',{x,y:m.t,width:bw,height:H-m.t-m.b,fill:'transparent'});
    bar.addEventListener('mousemove',e=>showTip(e,`${p.id} · iter ${p.iteration}\nopt ${(p.optimizer_seconds||0).toFixed(2)}s · run ${(p.runner_seconds||0).toFixed(2)}s\n$${(p.cost_usd||0).toFixed(4)} · ${p.tokens||0} tok`));
    bar.addEventListener('mouseleave',hideTip); el.append(bar);
  });
  // cumulative cost line (right axis, normalized)
  let d='';pts.forEach((p,i)=>{cum+=(p.cost_usd||0);const x=m.l+i*((W-m.l-m.r)/n)+3+bw/2;
    const y=H-m.b-(cum/costMax)*(H-m.t-m.b);d+=(i?' L':'M')+x+','+y;});
  if(S.cost.total_usd>0)el.append(svg('path',{d,fill:'none',stroke:'#f0d040','stroke-width':1.8,'stroke-dasharray':'4 3'}));
  s.append(el);
  s.append($('div',{class:'legend',html:'<span><i style="background:#4493f8"></i>optimizer s</span>'+
    '<span><i style="background:#3fb950"></i>runner s</span>'+
    (S.cost.total_usd>0?'<span><i style="background:#f0d040"></i>cumulative $</span>':'')}));
})();

/* ---------- 6b. cumulative cost vs best score ---------- */
(function(){
  if(S.cost.total_usd<=0)return;
  const pts=G.nodes.filter(n=>n.iteration&&n.best_so_far!=null).sort((a,b)=>a.iteration-b.iteration);
  if(pts.length<2)return;
  const s=sec('Cost vs best score'); const W=1080,H=220,m={l:46,r:16,t:14,b:28};
  let cum=0;const xy=pts.map(p=>{cum+=(p.cost_usd||0);return [cum,p.best_so_far];});
  const xmax=Math.max(...xy.map(p=>p[0]))||1,ymin=Math.min(...xy.map(p=>p[1]),0),ymax=Math.max(...xy.map(p=>p[1]),1);
  const X=v=>m.l+v/xmax*(W-m.l-m.r),Y=v=>H-m.b-(v-ymin)/((ymax-ymin)||1)*(H-m.t-m.b);
  const el=svg('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  let d='';xy.forEach((p,i)=>d+=(i?' L':'M')+X(p[0])+','+Y(p[1]));
  el.append(svg('path',{d,fill:'none',stroke:'#4493f8','stroke-width':2}));
  el.append(svg('text',{x:W-m.r,y:H-8,fill:'#8b949e','font-size':10,'text-anchor':'end'})).textContent=`$${xmax.toFixed(4)} total`;
  s.append(el);
})();

/* ---------- 6c. Cost & time per iteration (optimizer vs runner) + intake ---------- */
(function(){
  const rows=S.per_iteration||[];
  const intake=S.intake||{usd:0,seconds:0,tokens:0};
  const s=sec('Cost & time per iteration');
  // intake row — always shown, even at $0, so it's clear intake spent nothing.
  const dsec=v=>{v=Math.max(0,Math.round(v||0));if(v<60)return v+'s';
    const m=Math.floor(v/60);if(m<60)return m+'m '+(v%60)+'s';return Math.floor(m/60)+'h '+(m%60)+'m';};
  const intakeRow=$('div',{class:'phase',style:'margin-bottom:12px'});
  const esc=t=>String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  let intakeHtml='<span style="display:inline-block;width:10px;height:10px;border-radius:50%;'+
    'background:var(--accent);margin-right:6px;vertical-align:-1px"></span>'+
    '<b>Intake</b> &nbsp; cost <b>$'+(intake.usd||0).toFixed(4)+'</b>'+
    (intake.usd===0?' <span class="muted">(spent $0)</span>':'')+
    ' &nbsp; time <b>'+dsec(intake.seconds)+'</b> &nbsp; <span class="muted">'+
    (intake.tokens||0).toLocaleString()+' tok</span>';
  if(intake.output_summary)intakeHtml+='<div class="muted" style="margin-top:6px">'+esc(intake.output_summary)+'</div>';
  if((intake.implemented||[]).length)intakeHtml+='<div style="margin-top:6px"><span class="muted">implemented:</span> '+
    intake.implemented.map(x=>'<code>'+esc(x)+'</code>').join(' ')+'</div>';
  intakeRow.innerHTML=intakeHtml;
  s.append(intakeRow);
  if(!rows.length){s.append($('p',{class:'muted',text:'No iterations recorded yet.'}));return;}
  const optMax=Math.max(1e-6,...rows.map(r=>r.optimizer_seconds||0));
  const runMax=Math.max(1e-6,...rows.map(r=>r.runner_seconds||0));
  const t=$('table');
  t.append($('tr',{},$('th',{text:'iter'}),$('th',{text:'candidate'}),
    $('th',{class:'r',text:'opt $'}),$('th',{html:'<span style="color:var(--accent)">opt time</span>'}),
    $('th',{class:'r',text:'run $'}),$('th',{html:'<span style="color:var(--ok)">run time</span>'})));
  const bar=(secv,max,col)=>{const frac=max>0?Math.min(1,secv/max):0;
    const wrap=$('div',{style:'display:flex;align-items:center;gap:8px'});
    const track=$('div',{style:'height:6px;width:64px;border-radius:6px;overflow:hidden;background:var(--card2)'});
    track.append($('div',{style:`height:100%;border-radius:6px;width:${frac*100}%;background:${col}`}));
    wrap.append(track,$('span',{class:'muted num',text:dsec(secv)}));return wrap;};
  rows.forEach(r=>{
    t.append($('tr',{},
      $('td',{class:'num muted',text:r.iteration}),
      $('td',{},$('code',{text:r.candidate})),
      $('td',{class:'r num',text:r.optimizer_usd!=null?'$'+(+r.optimizer_usd).toFixed(4):'—'}),
      $('td',{},bar(r.optimizer_seconds||0,optMax,'#4493f8')),
      $('td',{class:'r num',text:r.runner_usd!=null?'$'+(+r.runner_usd).toFixed(4):'—'}),
      $('td',{},bar(r.runner_seconds||0,runMax,'#3fb950'))));
  });
  s.append(t);
  s.append($('div',{class:'legend',html:'<span><i style="background:#4493f8"></i>optimizer time</span>'+
    '<span><i style="background:#3fb950"></i>runner time</span>'+
    '<span class="muted">$ shown when available (runner cost is often $0/null) · time always</span>'}));
})();

/* ---------- 6d. Evaluations (split-oriented, distinct from per-iteration) ---------- */
(function(){
  const evals=S.evaluations||[];
  if(!evals.length)return;
  const s=sec('Evaluations');
  s.append($('p',{class:'muted',text:'Each scoring of a candidate on a split — '+
    'baseline (seed on val), every full val eval, and the sealed test eval. '+
    'Distinct from the optimizer-step view above.'}));
  const t=$('table');
  t.append($('tr',{},$('th',{text:'kind'}),$('th',{text:'candidate'}),$('th',{text:'split'}),
    $('th',{class:'r',text:'reward ± stderr'}),$('th',{class:'r',text:'runner $'}),
    $('th',{class:'r',text:'time'}),$('th',{class:'r',text:'tokens'}),$('th',{class:'r',text:'tasks × trials'})));
  const dsec=v=>{v=Math.max(0,Math.round(v||0));if(v<60)return v+'s';
    const m=Math.floor(v/60);if(m<60)return m+'m '+(v%60)+'s';return Math.floor(m/60)+'h '+(m%60)+'m';};
  const kindBadge={baseline:'b-seed',candidate:'b-accepted',test:'b-failed'};
  evals.forEach(e=>{
    const re=e.reward==null?'—':fmt(e.reward)+(e.stderr!=null?' ± '+(+e.stderr).toFixed(3):'');
    t.append($('tr',{},
      $('td',{},$('span',{class:'badge '+(kindBadge[e.kind]||'b-seed'),text:e.kind})),
      $('td',{},$('code',{text:e.candidate})),
      $('td',{class:'muted',text:e.split}),
      $('td',{class:'r num',text:re}),
      $('td',{class:'r num',text:e.cost_usd?'$'+(+e.cost_usd).toFixed(4):'—'}),
      $('td',{class:'r num',text:dsec(e.seconds)}),
      $('td',{class:'r num',text:(e.tokens||0).toLocaleString()}),
      $('td',{class:'r num',text:(e.n_tasks||0)+' × '+(e.trials||1)})));
  });
  s.append(t);
})();

/* ---------- 7. Annotations / diagnoses stream ---------- */
(function(){
  const W=S.gate_warnings||[], D=S.diagnoses||[];
  if(!W.length&&!D.length)return;
  const s=sec('Annotations & diagnoses');
  W.forEach(w=>{const a=$('div',{class:'ann'});a.append($('div',{class:'who',text:'gate · '+(w.mode||'')}),
    $('div',{text:w.reason||''}));s.append(a);});
  D.forEach(d=>{const a=$('div',{class:'ann diag'});a.append($('div',{class:'who',text:(d.kind||'diagnose')+(d.candidate?' · '+d.candidate:'')}),
    $('div',{text:(d.text||'').slice(0,400)}));s.append(a);});
})();

/* ---------- 8. Candidate leaderboard + git log ---------- */
(function(){
  const s=sec('Candidates'); const t=$('table');
  t.append($('tr',{},$('th',{text:'id'}),$('th',{text:'status'}),$('th',{class:'r',text:'val'}),
    $('th',{class:'r',text:'Δ parent'}),$('th',{class:'r',text:'iter'}),$('th',{text:'reason'})));
  G.nodes.slice().sort((a,b)=>(b.val||-1)-(a.val||-1)).forEach(n=>{
    const dlt=n.parent_val!=null&&n.val!=null?(n.val-n.parent_val):null;
    t.append($('tr',{},
      $('td',{},n.id===S.best_id?'★ '+n.id:n.id),
      $('td',{},$('span',{class:'badge b-'+n.status,text:n.status})),
      $('td',{class:'r num',text:fmt(n.val)}),
      $('td',{class:'r num',text:dlt==null?'—':(dlt>0?'+':'')+dlt.toFixed(3)}),
      $('td',{class:'r num',text:n.iteration}),
      $('td',{class:'muted',text:(n.reason||'').slice(0,80)})));
  });
  s.append(t);
  if(S.git_log&&S.git_log.length){
    s.append($('h2',{text:'Iteration store (git)',style:'margin-top:18px'}));
    const g=$('div',{class:'diff'});
    S.git_log.forEach(r=>g.append($('div',{class:'ctx',text:r.hash+'  '+r.subject})));
    s.append(g);
  }
})();
</script></body></html>
