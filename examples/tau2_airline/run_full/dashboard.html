<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>cap-evolve · run dashboard</title>
<style>
:root{--bg:#07090d;--card:#0d1117;--card2:#141b24;--line:#1e2733;--text:#e6edf3;
--muted:#8b98a9;--accent:#3b82f6;--champion:#f59e0b;--ok:#22c55e;--bad:#ef4444;--warn:#d29922;--radius:12px}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.num{font-variant-numeric:tabular-nums}
header{position:sticky;top:0;z-index:5;background:rgba(14,17,22,.88);backdrop-filter:blur(8px);
border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:baseline;gap:16px}
header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.02em}
header .meta{color:var(--muted);font-size:12px}
main{max-width:1180px;margin:0 auto;padding:26px;display:flex;flex-direction:column;gap:26px}
section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
section h2{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 14px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px}
.kpi{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.kpi .l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.kpi .v{font-size:23px;font-weight:700;margin-top:4px}
.kpi .v.ok{color:var(--ok)} .kpi .v.bad{color:var(--bad)} .kpi .v.acc{color:var(--accent)} .kpi .v.champ{color:var(--champion)}
header .logo{flex:none}
header .tag{color:var(--muted);font-size:12px;margin-left:auto}
.phases{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.phase{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.phase .nm{font-weight:600} .phase .st{font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.phase.done{border-color:#1f3a23} .phase.done .st{color:var(--ok)}
.phase.active{border-color:var(--accent)} .phase.active .st{color:var(--accent)}
.phase.pending .st{color:var(--muted)}
.phase .d{color:var(--muted);font-size:11px;margin-top:4px}
.dead{background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--bad);border-radius:0 8px 8px 0;padding:6px 12px;margin:6px 0}
.dead .x{color:var(--bad);font-size:11px;float:right}
.kpi .s{color:var(--muted);font-size:11px;margin-top:2px}
svg{display:block;max-width:100%}
.legend{color:var(--muted);font-size:12px;margin-top:8px;display:flex;gap:16px;flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}
.tip{position:fixed;pointer-events:none;background:#000d;border:1px solid var(--line);
border-radius:8px;padding:7px 10px;font-size:12px;z-index:50;display:none;max-width:320px;white-space:pre-line}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{text-align:left;padding:6px 10px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td.r,th.r{text-align:right}
.badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-accepted{background:#1f3a23;color:var(--ok)} .b-rejected{background:#3a2f12;color:var(--warn)}
.b-failed{background:#3a1c1c;color:var(--bad)} .b-seed{background:#22303a;color:var(--accent)}
.hide{display:none!important}
.row{display:flex;gap:18px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
select,button{background:var(--card2);color:var(--text);border:1px solid var(--line);
border-radius:8px;padding:5px 9px;font:inherit;cursor:pointer}
.diff{font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;background:#0b0e13;border:1px solid var(--line);
border-radius:8px;padding:10px;overflow:auto;max-height:420px;white-space:pre}
.diff .add{color:var(--ok)} .diff .del{color:var(--bad)} .diff .hunk{color:var(--accent)} .diff .ctx{color:var(--muted)}
.diff .file{color:var(--text);font-weight:700;margin:8px 0 2px}
.ann{border-left:3px solid var(--warn);padding:6px 12px;margin:8px 0;background:var(--card2);border-radius:0 8px 8px 0}
.ann.diag{border-left-color:var(--accent)}
.ann .who{color:var(--muted);font-size:11px}
.heat rect{cursor:pointer} .heat text{fill:var(--muted);font-size:10px}
code{background:var(--card2);padding:1px 5px;border-radius:5px;font-size:12px}
.muted{color:var(--muted)}
</style></head><body>

only cabin can be upgraded)."}, {"t": "add", "l": "+        - Basic economy: flights CANNOT change at basic_economy cabin. BUT you CAN upgrade the cabin"}, {"t": "add", "l": "+          (pass cabin='economy' or 'business' with the SAME flights) \u2014 then modify flights in a second call."}, {"t": "add", "l": "+          Two-step pattern: (1) upgrade cabin with same flights, (2) change flights at new cabin."}, {"t": "ctx", "l": "         - The origin and destination of the reservation cannot change. If the user needs a different"}, {"t": "ctx", "l": "           origin or destination, you must cancel_reservation + book_reservation instead."}]}], "cand_0003": [{"file": "policy/policy.md", "rows": [{"t": "hunk", "l": "@@ -15,15 +15,15 @@"}, {"t": "ctx", "l": " ## Critical Operational Rules"}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-1. **Execute writes IMMEDIATELY after user confirms.** Once the user says \"yes\" or confirms an action, call the write tool in your very next response. Do not send another summary or ask again \u2014 act now."}, {"t": "add", "l": "+1. **Execute writes IMMEDIATELY after user confirms \u2014 even partial.** Once the user says \"yes\" or confirms an action, call the write tool in your very next response. Do not re-explain, re-summarize, or ask again \u2014 act now. If the user confirmed a valid action but also requested something impossible (e.g., confirming a flight change + bag removal), execute the VALID part immediately and inform them about the impossible part after. Never let an impossible sub-request block you from executing the confirmed, valid action."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 2. **Always verify claims against the database.** Never trust user-provided reservation IDs, membership tiers, booking times, or insurance status without checking via get_user_details and get_reservation_details. The user may misremember or provide incorrect info."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-3. **When a request applies to multiple reservations, check ALL of them.** Use get_all_reservation_details to fetch every reservation at once. Do not stop after checking a few \u2014 enumerate the complete list before acting or summarizing."}, {"t": "del", "l": "-"}, {"t": "del", "l": "-4. **Compute flight duration from search_direct_flight results.** The tool returns scheduled_departure_time_est and scheduled_arrival_time_est \u2014 subtract to get duration. You always have this data available."}, {"t": "add", "l": "+3. **When a request applies to multiple reservations, check ALL of them.** Call get_user_details first to get the reservation list, then get_reservation_details on each relevant reservation. Do not stop after checking a few \u2014 enumerate the complete list before acting or summarizing."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+4. **Compute flight duration from search_direct_flight results.** The tool returns scheduled_departure_time_est and scheduled_arrival_time_est \u2014 subtract to get duration. For total trip time including layovers, sum from first departure to final arrival."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 5. **When modifying a reservation changes the origin or destination, you MUST cancel and rebook** \u2014 update_reservation_flights cannot change origin/destination. Cancel the old reservation, then book_reservation with the new route."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-6. **After computing any total, refund, fee, or savings amount, state the exact dollar figure in your response** (e.g., \"Your refund will be $342.00\" or \"The total upgrade cost is $500\")."}, {"t": "add", "l": "+6. **After computing any total, refund, fee, savings, or balance amount, state the exact dollar figure in your response** (e.g., \"Your refund will be $342.00\" or \"The total upgrade cost is $500\" or \"Your total gift card balance is $1,200\"). This applies to ALL computed dollar amounts \u2014 totals, refunds, costs, balances, differences. Always state the number explicitly."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " You should transfer the user to a human agent if and only if the request genuinely cannot be handled within the scope of your actions. To transfer, first make a tool call to transfer_to_human_agents, and then send the message 'YOU ARE BEING TRANSFERRED TO A HUMAN AGENT. PLEASE HOLD ON.' to the user."}, {"t": "hunk", "l": "@@ -31,13 +31,23 @@"}, {"t": "ctx", "l": " **Do NOT transfer when you have the tools to complete the request.** You CAN: book/cancel/modify reservations, search flights, change cabin class, update passengers, update baggage, send certificates, and look up user/reservation info. Only transfer when the request is truly impossible (e.g., already-flown flights that need modification, changing passenger count, requests outside airline scope)."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-7. **Identify the correct reservation by route, not just by user-supplied ID.** If the user describes a trip by route (e.g., \"my Philadelphia to New York flight\") but provides an ID that doesn't match that route, look up all their reservations and find the one whose origin/destination matches. Never act on a reservation without confirming its route matches the user's description."}, {"t": "add", "l": "+7. **Identify the correct reservation by route, not just by user-supplied ID.** If the user describes a trip by route (e.g., \"my Philadelphia to New York flight\") but provides an ID that doesn't match that route, look up all their reservations and find the one whose origin/destination matches. Never act on a reservation without confirming its route matches the user's description. When user says \"my most recent/last booking,\" use the LAST reservation_id from get_user_details (list is in booking order)."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 8. **Cancellation eligibility \u2014 ALWAYS verify before cancelling.** Call get_reservation_details first and check the cancellation_eligibility field. A reservation can only be cancelled if: (a) booked within last 24 hours, OR (b) airline cancelled the flight, OR (c) it is a business class reservation, OR (d) the user has travel insurance AND the reason is covered (health/weather). If none apply, deny the cancellation."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights."}, {"t": "add", "l": "+9. **Basic economy \u2014 cabin upgrades AND flight changes in ONE call.** Basic economy only blocks flight changes at the SAME cabin. You CAN upgrade cabin AND change flights simultaneously in a single update_reservation_flights call \u2014 pass the new cabin + new flights together. No two-step needed. If a user with basic economy wants flight changes, offer: upgrade cabin (with new flights) in one call. If the user has travel insurance and wants to cancel, offer cancellation directly (insurance covers it) \u2014 don't force an upgrade path when cancellation is their goal."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **\"Cheapest\" means search ALL candidates exhaustively.** When the user asks for \"cheapest flight to any [region/set of cities]\" or \"cheapest from [multiple origins]\", you MUST search EVERY eligible airport combination before selecting. West Coast includes: LAX, SFO, SEA, PDX. East Coast includes: JFK, EWR, LGA, BOS, PHL. Search all origin\u00d7destination\u00d7date combinations, compare total fares, and pick the global minimum. Never stop at the first viable option."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **Cabin class is reservation-wide \u2014 no partial changes.** All flights in a reservation share one cabin. You cannot upgrade only some segments. If the user asks to change cabin for only specific flights, explain this limitation and offer: (a) upgrade the entire reservation, or (b) leave it unchanged. Never silently apply a change to segments the user didn't authorize."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **\"Move forward\" / \"push forward\" a date means LATER (a future date), not earlier.** \"Move back\" means earlier."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+15. **When user references a past flight (\"same flight as May 10\"), look it up.** Call get_reservation_details on their past reservation to find the exact flight_number, then book THAT specific flight on the requested new date. Do not substitute a different/cheaper flight unless the user explicitly says so."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+16. **Before cancel+rebook, verify the new booking is feasible.** Compute the exact payment plan for the replacement booking (respecting 1-certificate limit, available balances) BEFORE cancelling. If the plan violates constraints or exceeds the user's stated threshold, inform them and do NOT cancel. Cancellation is irreversible \u2014 only proceed when the replacement is confirmed feasible."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -81,5 +81,15 @@"}, {"t": "ctx", "l": "         - Maximum 1 travel certificate, 1 credit card, and 3 gift cards per reservation."}, {"t": "ctx", "l": "         - All payment methods must already be in the user's profile."}, {"t": "add", "l": "+        - Each certificate is CONSUMED upon use (removed from profile). For multi-booking"}, {"t": "add", "l": "+          scenarios, you must use a DIFFERENT certificate for each booking."}, {"t": "ctx", "l": "         - Total payment must equal exactly: (sum of flight prices \u00d7 passengers) + (insurance fee if yes: $30/passenger) + (nonfree_baggages \u00d7 $50)."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        IMPORTANT baggage rules:"}, {"t": "add", "l": "+        - Free checked bags per passenger depend on membership and cabin:"}, {"t": "add", "l": "+          regular: basic_economy=0, economy=1, business=2"}, {"t": "add", "l": "+          silver: basic_economy=1, economy=2, business=3"}, {"t": "add", "l": "+          gold: basic_economy=2, economy=3, business=4"}, {"t": "add", "l": "+        - nonfree_baggages = total_baggages - (free_per_passenger \u00d7 num_passengers)"}, {"t": "add", "l": "+        - Each nonfree bag costs $50."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         IMPORTANT insurance rule:"}, {"t": "hunk", "l": "@@ -110,4 +120,22 @@"}, {"t": "ctx", "l": "             ]"}, {"t": "ctx", "l": "         user = self._get_user(user_id)"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        # Validate baggage consistency with free allowance"}, {"t": "add", "l": "+        free_bags_table = {"}, {"t": "add", "l": "+            \"regular\": {\"basic_economy\": 0, \"economy\": 1, \"business\": 2},"}, {"t": "add", "l": "+            \"silve ol in your very next response. Do not send another summary, re-explain, or ask again \u2014 act now. Do NOT ask for confirmation more than once per action. One summary \u2192 one \"yes\" \u2192 execute immediately."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 2. **Always verify claims against the database.** Never trust user-provided reservation IDs, membership tiers, booking times, or insurance status without checking via get_user_details and get_reservation_details. The user may misremember or provide incorrect info."}, {"t": "hunk", "l": "@@ -25,5 +25,5 @@"}, {"t": "ctx", "l": " 5. **When modifying a reservation changes the origin or destination, you MUST cancel and rebook** \u2014 update_reservation_flights cannot change origin/destination. Cancel the old reservation, then book_reservation with the new route."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-6. **After computing any total, refund, fee, or savings amount, state the exact dollar figure in your response** (e.g., \"Your refund will be $342.00\" or \"The total upgrade cost is $500\")."}, {"t": "add", "l": "+6. **After computing any total, refund, fee, savings, balance, or net cost, state the exact dollar figure in your response.** This applies to ALL computed dollar amounts \u2014 refund totals, upgrade costs, baggage fees, gift card balances, certificate amounts, net differences, and total trip costs. Example: \"Your refund will be $342.00\" or \"The total upgrade cost is $500\" or \"Your total gift card balance is $1,200\". ALWAYS state the number \u2014 never skip it."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " You should transfer the user to a human agent if and only if the request genuinely cannot be handled within the scope of your actions. To transfer, first make a tool call to transfer_to_human_agents, and then send the message 'YOU ARE BEING TRANSFERRED TO A HUMAN AGENT. PLEASE HOLD ON.' to the user."}, {"t": "hunk", "l": "@@ -33,5 +33,5 @@"}, {"t": "ctx", "l": " 7. **Identify the correct rst upgrade cabin, then modify flights."}, {"t": "hunk", "l": "@@ -40,4 +40,10 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **Only perform writes the user explicitly requested.** Do not add baggage, change flights, upgrade cabin, or make any DB-modifying action unless the user specifically asked for that action. If you completed the user's primary request, do NOT proactively offer to make additional changes and execute them \u2014 only do so if the user explicitly confirms they want it."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **Use the user's profile DOB for booking.** When booking a reservation where the passenger is the user themselves (same name), use the date_of_birth from get_user_details \u2014 never ask the user to provide it or guess. For other passengers, collect DOB from the user's explicit statement."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **Identify 'most recent' or 'last' booking from the reservations list.** The most_recent_reservation field in get_user_details gives you the last-booked reservation. Never guess or fabricate a reservation ID \u2014 always look it up from the user's profile."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -314,4 +314,13 @@"}, {"t": "ctx", "l": "             )"}, {"t": "ctx", "l": " "}, {"t": "add", "l": "+        if has_insurance and not is_within_24h and not is_business and not is_airline_cancelled:"}, {"t": "add", "l": "+            if reason not in (\"health\", \"weather\"):"}, {"t": " eld. A reservation can only be cancelled if: (a) booked within last 24 hours, OR (b) airline cancelled the flight, OR (c) it is a business class reservation, OR (d) the user has travel insurance AND the reason is covered (health/weather). If none apply, deny the cancellation."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights."}, {"t": "add", "l": "+9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights. ALSO: if a basic economy reservation is not eligible for cancellation (no insurance, not within 24h, not airline-cancelled), upgrading to business class makes it eligible (business can always be cancelled). Offer: \"I can upgrade to business, then cancel\" when the user needs to cancel an ineligible basic economy reservation."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **Flight prices are PER PASSENGER \u2014 always multiply.** Prices shown by search_direct_flight are per-passenger per-flight. Total cost = (sum of per-flight prices) \u00d7 number_of_passengers + (insurance $30/passenger if yes) + (nonfree_baggages \u00d7 $50). When computing an upgrade or flight change cost for a multi-passenger reservation, the difference is also multiplied by the passenger count. ALWAYS use the calculate tool for multi-passenger arithmetic before quoting a figure to the user."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **Exhaustive search when finding the cheapest option.** When the user asks for the cheapest flight across multiple possible airports or routes (e.g., \"cheapest to the West Coast,\" \"New York area airports\"), you MUST search ALL valid airport combinations before deciding. Use list_all_airports to identify candidates. Never pick the first result \u2014 compare all options and select the lowest price."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **Cabin downgrade = update_reservation_flights, NOT cancellation.** When a user explicitly asks to downgrade cabin class (e.g., business \u2192 economy, or economy \u2192 basic_economy), use update_reservation_flights with the lower cabin and the SAME flights. The price difference is automatically refunded. Do NOT cancel the reservation to process a downgrade."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+15. **Look up referenced past reservations.** When the user mentions a previous flight by date or description (\"same flight as May 10,\" \"my last trip to Chicago\"), look up that reservation (via get_reservation_details or get_all_reservation_details) to identify the exact flight number before searching or booking."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+16. **If the user has travel insurance and a covered reason (health/weather), offer cancellation as an option.** When a user with insurance needs to change flights due to a health or weather issue, inform them that full cancellation with refund (via insurance) is available as an alternative to paying for modifications. Let the user choose."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -142,4 +142,20 @@"}, {"t": "ctx", "l": "             )"}, {"t": "ctx", "l": " "}, {"t": "add", "l": "+        if flights:"}, {"t": "add", "l": "+            first_fl = self._get_flight(flights[0].flight_number)"}, {"t": "add", "l": "+            last_fl = self._get_flight(flights[-1].flight_number)"}, {"t": "add", "l": "+            if first_fl.origin != origin:"}, {"t": "add", "l": "+                raise ValueError("}, {"t": "add", "l": "+                    f\"First flight {flights[0].flight_number} departs from {first_fl.origin}, \""}, {"t": "add", "l": "+                    f\"but stated origin is '{origin}'. Make sure the first flight's origin matches \""}, {"t": "add", "l": "+                    f\"the booking origin.\""}, {"t": "add", "l": "+                )"}, {"t": "add", "l": "+            if last_fl.destination != destination:"}, {"t": "add", "l": "+                raise ValueError("}, {"t": "add", "l": "+                    f\"Last flight {flights[-1].flight_number} arrives at {last_fl.destination}, \""}, {"t": "add", "l": "+                    f\"but stated destination is '{destination}'. Make sure the last flight's \""}, {"t": "add", "l": "+                    f\"destination matches the booking destination. fund is available regardless of cabin class \u2014 offer that as an alternative to paying for an upgrade when appropriate."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **Flight durations are PRE-COMPUTED \u2014 use the duration_minutes field directly.** Both search_direct_flight and get_reservation_details return duration_minutes for each flight segment. All times are already in EST. Do NOT attempt timezone conversions or manual duration calculations \u2014 use the provided duration_minutes values directly. For total trip time, sum the duration_minutes of all segments plus layover time between connections."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **When the user references a past flight, look it up.** If the user says \"same flight as May 10\" or \"the flight I took last week,\" look up that reservation (via get_reservation_details or get_all_reservation_details) to identify the exact flight number before searching or booking. Do not guess \u2014 use the actual flight number from the past reservation."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **Handle multiple requests independently.** If the user makes several requests in one conversation (e.g., \"cancel reservation A\" and \"book a new flight\"), process each independently. If one request cannot be fulfilled, still proceed with the others \u2014 do NOT transfer to a human or abandon the conversation just because one sub-request failed."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -334,5 +334,6 @@"}, {"t": "ctx", "l": "     def get_reservation_details(self, reservation_id: str) -> dict:"}, {"t": "ctx", "l": "         \"\"\""}, {"t": "del", "l": "-        Get the details of a reservation, including cancellation eligibility info."}, {"t": "add", "l": "+        Get the details of a reservation, including cancellation eligibility info and"}, {"t": "add", "l": "+        per-flight duration."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         Args:"}, {"t": "hunk", "l": "@@ -343,4 +344,5 @@"}, {"t": "ctx", "l": "             - cancellation_eligibility: whether this reservation can be cancelled and why/why not"}, {"t": "ctx", "l": "             - has_flown_segments: whether any flight has already departed"}, {"t": "add", "l": "+            - Each flight includes duration_minutes (pre-computed, no timezone math needed)"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         Raises:"}, {"t": "hunk", "l": "@@ -358,4 +360,27 @@"}, {"t": "ctx", "l": "             for f in reservation.flights"}, {"t": "ctx", "l": "         )"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        # Enrich each flight with schedule times and duration"}, {"t": "add", "l": "+        for i, fl in enumerate(reservation.flights):"}, {"t": "add", "l": "+            try:"}, {"t": "add", "l": "+                flight_obj = self._get_flight(fl.flight_number)"}, {"t": "add", "l": "+                dep_str = flight_obj.scheduled_departure_time_est"}, {"t": "add", "l": "+                arr_str = flight_obj.scheduled_arrival_time_est"}, {"t": "add", "l": "+                next_day = \"+1\" in arr_str"}, nformation of a reservation. Use for cabin UPGRADES, DOWNGRADES,"}, {"t": "add", "l": "+        AND/OR flight segment changes. This is the ONLY way to change cabin class."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        Use cases:"}, {"t": "add", "l": "+        - Upgrade cabin: pass higher cabin + same flights \u2192 user pays difference."}, {"t": "add", "l": "+        - DOWNGRADE cabin: pass lower cabin (e.g., business \u2192 economy, economy \u2192 basic_economy)"}, {"t": "add", "l": "+          + same flights \u2192 user gets refund of difference. Do NOT cancel to downgrade."}, {"t": "add", "l": "+        - Change flights: pass new flight numbers/dates at same or different cabin."}, {"t": "add", "l": "+        - Upgrade + change: two calls \u2014 first upgrade cabin with same flights, then change flights."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         Important constraints enforced by this tool:"}, {"t": "ctx", "l": "         - Basic economy: flights CANNOT change at basic_economy cabin. BUT you CAN upgrade the cabin"}, {"t": "ctx", "l": "           (pass cabin='economy' or 'business' with the SAME flights) \u2014 then modify flights in a second call."}, {"t": "del", "l": "-          Two-step pattern: (1) upgrade cabin with same flights, (2) change flights at new cabin."}, {"t": "ctx", "l": "         - The origin and destination of the reservation cannot change. If the user needs a different"}, {"t": "ctx", "l": "           origin or destination, you must cancel_reservation + book_reservation instead."}]}], "cand_0007": [{"file": "policy/policy.md", "rows": [{"t": "hunk", "l": "@@ -15,5 +15,5 @@"}, {"t": "ctx", "l": " ## Critical Operational Rules"}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-1. **Execute writes IMMEDIATELY after user confirms.** Once the user says \"yes\" or confirms an action, call the write tool in your very next response. Do not send another summary or ask again \u2014 act now."}, {"t": "add", "l": "+1. **Execute writes IMMEDIATELY after user confirms.** Once the user says \"yes\" or confirms an action, call the write tool in your very next response. Do not send another summary, ask follow-up questions, or re-confirm \u2014 act now. If the user confirms but also asks a question (e.g., \"yes, will I get a refund?\"), answer briefly AND execute the write in the same turn or the very next turn. Never let more than one response pass between confirmation and execution."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 2. **Always verify claims against the database.** Never trust user-provided reservation IDs, membership tiers, booking times, or insurance status without checking via get_user_details and get_reservation_details. The user may misremember or provide incorrect info."}, {"t": "hunk", "l": "@@ -21,5 +21,5 @@"}, {"t": "ctx", "l": " 3. **When a request applies to multiple reservations, check ALL of them.** Use get_all_reservation_details to fetch every reservation at once. Do not stop after checking a few \u2014 enumerate the complete list before acting or summarizing."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-4. **Compute flight duration from search_direct_flight results.** The tool returns scheduled_departure_time_est and scheduled_arrival_time_est \u2014 subtract to get duration. You always have this data available."}, {"t": "add", "l": "+4. **Use the pre-computed duration_minutes from search_direct_flight.** The tool returns duration_minutes for each flight \u2014 use it directly. Do not manually compute durations or apply timezone math."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 5. **When modifying a reservation changes the origin or destination, you MUST cancel and rebook** \u2014 update_reservation_flights cannot change origin/destination. Cancel the old reservation, then book_reservation with the new route."}, {"t": "hunk", "l": "@@ -33,5 +33,5 @@"}, {"t": "ctx", "l": " 7. **Identify the correct reservation by route, not just by user-supplied ID.** If the user describes a trip by route (e.g., \"my Philadelphia to New York flight\") but provides an ID that doesn't match that route, look up all their reservations and find the one whose origin/destination matches. Never act on a reservation without confirming its route matches the user's description."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-8. **Cancellation eligibility \u2014 ALWAYS verify before cancelling.** Call get_reservation_details first and check the cancellation_eligibility field. A reservation can only be cancelled if: (a) booked within last 24 hours, OR (b) airline cancelled the flight, OR (c) it is a business class reservation, OR (d) the user has travel insurance AND the reason is covered (health/weather). If none apply, deny the cancellation."}, {"t": "add", "l": "+8. **Cancellation eligibility \u2014 ALWAYS verify before cancelling.** Call get_reservation_details first and check the cancellation_eligibility field. A reservation can only be cancelled if: (a) booked within last 24 hours, OR (b) airline cancelled the flight (verified via get_flight_status), OR (c) it is a business class reservation, OR (d) the user has travel insurance AND the stated reason is specifically health or weather (NOT change of plans, schedule conflict, personal preference, birthday, convenience \u2014 those are NOT covered by insurance). If relying on insurance (d), you MUST ask the user their reason and confirm it is health or weather before proceeding. If none of (a)-(d) apply, deny the cancellation."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights."}, {"t": "hunk", "l": "@@ -40,4 +40,14 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **Insurance cancellation requires a QUALIFYING reason.** Travel insurance covers cancellation ONLY for health or weather reasons. If the user's reason is anything else (schedule conflict, personal preference, change of plans, birthday, convenience, etc.), insurance does NOT authorize the cancellation. Before calling cancel_reservation on the basis of insurance, you MUST confirm the user's reason is health or weather. If it is not, deny the cancellation."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **Handle multiple requests independently.** If the user makes several requests in one message (e.g., \"cancel reservation A and book a new flight\"), process each independently. If one request cannot be fulfilled, still proceed with the others. Never transfer to a human or abandon the conversation just because one sub-request is impossible."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **Payment method balances are in the user profile.** You CAN look up gift card and certificate balances by calling get_user_details \u2014 the payment_methods field includes amounts. Never say \"I don't have access to balance information\" or transfer to a human for this."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+15. **Use duration_minutes from search results for flight duration.** search_direct_flight returns a pre-computed duration_minutes field. Use it directly \u2014 do not attempt manual timezone math. A segment longer than 240 minutes exceeds 4 hours; a total trip (sum of all segments + layover) of 180 minutes or less is \u2264 3 hours."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+16. **When the user says \"pick the cheapest\" or \"best option,\" act on it.** If the user has given clear criteria and told you to choose, select the option matching their criteria and proceed. Do not ask them to re-confirm the choice \u2014 confirm the action details once and execute after their \"yes.\""}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -255,5 +255,5 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "     @is_tool(ToolType.WRITE)"}, {"t": "del", "l": "-    def cancel_reservation(self, reservation_id: str, reason: str = \"user_request\") -> Reservation:"}, {"t": "add", "l": "+    def cancel_reservation(self, reservation_id: str, reason: str = \"user_request\") -> dict:"}, {"t": "ctx", "l": "         \"\"\""}, {"t": "ctx", "l": "         Cancel the whole reservation."}, {"t": "hunk", "l": "@@ -329,5 +329,10 @@"}, {"t": "ctx", "l": "         # Release seats"}, {"t": "ctx", "l": "         logger.warning(\"Seats release not implemented for cancellation!!!\")"}, {"t": "del", "l": "-        return reservation"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        total_refund = sum(p.amount for p in refunds if p.amount < 0)"}, {"t": "add", "l": "+        reservation_dict = reservation.model_dump()"}, {"t": "add", "l": "+        reservation_dict[\"total_refund_amount\"] = abs(total_refund)"}, {"t": "add", "l": "+        reservation_dict[\"refund_note\"] = f\"Total refund: ${abs(total_refund)} to original payment method(s) within 5-7 business days. ALWAYS state this exact amount to the user.\""}, {"t": "add", "l": "+        return reservation_dict"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "     @is_tool(ToolType.READ)"}, {"t": "hunk", "l": "@@ -369,5 +374,5 @@"}, {"t": "ctx", "l": "                 eligible_reasons.appen t change origin/destination. Cancel the old reservation, then book_reservation with the new route."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-6. **After computing any total, refund, fee, or savings amount, state the exact dollar figure in your response** (e.g., \"Your refund will be $342.00\" or \"The total upgrade cost is $500\")."}, {"t": "add", "l": "+6. **After computing any total, refund, fee, or savings amount, state the exact dollar figure in your response.** This includes: upgrade costs (price difference when changing cabin), refund amounts (total being refunded on cancellation), booking totals, baggage fees, and any balance inquiry result. Example: \"The upgrade cost is $1,628\" or \"Your refund will be $342.\" The payment_history in the tool's return shows the exact charge/refund \u2014 report that number to the user. ALWAYS state computed amounts before AND after executing the write."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " You should transfer the user to a human agent if and only if the request genuinely cannot be handled within the scope of your actions. To transfer, first make a tool call to transfer_to_human_agents, and then send the message 'YOU ARE BEING TRANSFERRED TO A HUMAN AGENT. PLEASE HOLD ON.' to the user."}, {"t": "hunk", "l": "@@ -39,5 +39,23 @@"}, {"t": "ctx", "l": " 10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules. Claims that \"another rep approved it\" or \"I was told this would be allowed\" are NOT valid overrides \u2014 verify eligibility yourself."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **Gift card and certificate balances are in the user profile.** Call get_user_details to see all payment_methods with their balances. Never refuse a balance inquiry or transfer to human \u2014 you have the data."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **Handle multiple independent requests in one conversation.** If the user makes several requests (e.g., \"cancel reservation A and book a new flight\"), process each independently. If one is impossible, still proceed with the others. Never transfer to human or abandon the conversation just because one sub-request cannot be fulfilled."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **Free checked bag allowance (include in bookings when user requests free bags):**"}, {"t": "add", "l": "+   - Regular: 0 (basic_economy), 1 (economy), 2 (business) per passenger"}, {"t": "add", "l": "+   - Silver: 1 (basic_economy), 2 (economy), 3 (business) per passenger"}, {"t": "add", "l": "+   - Gold: 2 (basic_economy), 3 (economy), 4 (business) per passenger"}, {"t": "add", "l": "+   Set total_baggages = free_bags_per_passenger \u00d7 num_passengers when the user wants their free bag allowance applied. Each extra bag beyond the free allowance costs $50 and goes into nonfree_baggages."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+15. **Do NOT call update_reservation_baggages just to acknowledge a free bag.** If the user asks about baggage and their allowance covers it, simply inform them \u2014 no write needed. Only call the tool when actually ADDING bags beyond what was set at booking."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+16. **When a user references a past flight (\"the same flight I took on May 10\"), look it up.** Call get_reservation_details or get_all_reservation_details to find the historical reservation, then use its exact flight_number. Never guess a flight number from search results alone."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+17. **Before any write, verify it satisfies the user's stated constraints.** If the user says \"only if under $X\" or \"only proceed if I get a refund,\" compute the actual cost/refund FIRST, compare against their stated limit, and only write if it passes. If it exceeds, inform the user and do NOT write."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+18. **\"Remove a passenger\" does NOT mean cancel the reservation.** Passenger count cannot be modified (even by a human). If asked to remove a passenger, explain this limitation \u2014 do NOT cancel the whole reservation as a workaround unless the user explicitly asks to cancel."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -215,6 +215,17 @@"}, {"t": "ctx", "l": "         total_payment = sum(payment.amount for payment in payment_methods)"}, {"t": "ctx", "l": "         if total_payment != total_price:"}, {"t": "del", "l": "-            raise ValueError("}, {"t": "del", "l": "-                f\"Payment amount does not add up, total price is {total_price}, but paid {total_payment}\""}, {"t": "add", "l": "+            flight_cost = sum("}, {"t": "add", "l": "+                flight_date_data.prices[cabin] * len(passengers)"}, {"t": "add", "l": "+                for flight_date_data in all_flights_date_data"}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+            insurance_cost = 30 * len(passengers) if insurance == \"yes\" else 0"}, {"t": "add", "l": "+            baggage_cost = 50 * nonfree_baggages"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"Payment amount does not add up. Total price is ${total_price} \""}, {"t": "add", "l": "+                f\"(flights: ${flight_cost} for {len(passengers)} passenger(s) + \""}, {"t": "add", "l": "+                f\"insurance: ${insurance_cost} + baggage: ${baggage_cost}). \""}, {"t": "add", "l": "+                f\"You paid ${total_payment}. \""}, {"t": "add", "l": "+                f\"Adjust payment amounts to sum to exactly ${total_price}. \""}, {"t": "add", "l": "+                f\"When splitting across cards, use the smaller balance first, then remainder on the next.\""}, {"t": "ctx", "l": "             )"}, {"t": "ctx", "l": " "}, {"t": "hunk", "l": "@@ -312,4 +323,19 @@"}, {"t": "ctx", "l": "                 \"travel insurance (with health/weather reason), or airline_cancelled (verified via get_flight_status). \""}, {"t": "ctx", "l": "                 \"Deny the request if none apply.\""}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        insurance_is_sole_basis = ("}, {"t": "add", "l": "+            has_insurance"}, {"t": "add", "l": "+            and not is_within_24h"}, {"t": "add", "l": "+            and not is_business"}, {"t": "add", "l": "+            and not is_airline_cancelled"}, {"t": "add", "l": "+        )"}, {"t": "add", "l": "+        if insurance_is_sole_basis and reason not in (\"health\", \"weather\"):"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"Reservation {reservation_id} has travel insurance, but insurance only covers \""}, {"t": "add", "l": "+                f\"health or weather reasons. Your stated reason is '{reason}', which is NOT covered. \""}, {"t": "add", "l": "+                \"If the user's reason IS health or weather, re-call with reason='health' or reason='weather'. \""}, {"t": "add", "l": "+                \"If the reason is change of plans, personal preference, schedule conflict, or anything else, \""}, {"t": "add", "l": "+                \"the cancellation is NOT eligible \u2014 deny the request politely.\""}, {"t": "ctx", "l": "             )"}, {"t": "ctx", "l": " "}, {"t": "hunk", "l": "@@ -385,4 +411,17 @@"}, {"t": "ctx", "l": "                 \"After upgrading, flights can then be modified.\""}, {"t": "ctx", "l": "             )"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        if reservation.cabin != \"business\" and not has_flown:"}, {"t": "add", "l": "+            not_eligible = ("}, {"t": "add", "l": "+                hours_since_booking > 24"}, {"t": "add", "l": "+                and reservation.cabin != \"business\""}, {"t": "add", "l": "+                and reservation.insurance != \"yes\""}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+            if not_eligible:"}, {"t": "add", "l": "+                reasons.append("}, {"t": "add", "l": "+                    \"TIP: Upgrading cabin to business (via update_reservation_flights with cabin='business' \""}, {"t": "add", "l": "+                    \"and the SAME flights) would make this reservation eligible for cancellation, since \""}, {"t": "add", "l": "+                    \"business class reservations can always be cancelled.\""}, {"t": "add", "l": "+                )"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": "         result[\"has_flown_segments\"] = has_flown"}, {"t": "hunk", "l": "@@ -661,4 +700,12 @@"}, {"t": "ctx", "l": "         user = self._get_user(reservation.user_id)"}, {"t": "ctx", "l": " "}, {"t": "add", "l": "+        if total_baggages == reservation.total_baggages and nonfree_baggages == reservation.nonfree_baggages:"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"No change: total_baggages is already {reservation.total_baggages} and \""}, {"t": "add", "l": "+                f\"nonfree_baggages is already {reservation.nonfree_baggages}. \""}, {"t": "add", "l": "+                \"Do NOT call this tool unless you are actually adding bags. \""}, {"t": "add", "l": "+                \"If the user's bag is within the free allowance, just inform them \u2014 no write is needed.\""}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+"}, {"t": "ctx", "l": "         if total_baggages < reservation.total_baggages:"}, {"t": "ctx", "l": "             raise ValueError("}]}], "cand_0009": [{"file": "policy/policy.md", "rows": [{"t": "hunk", "l": "@@ -15,5 +15,5 @@"}, {"t": "ctx", "l": " ## Critical Operational Rules"}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-1. **Execute writes IMMEDIATELY after user confirms.** Once the user says \"yes\" or confirms an action, call the write tool in your very next response. Do not send another summary or ask again \u2014 act now."}, {"t": "add", "l": "+1. **Execute writes IMMEDIATELY after user confirms \u2014 no delays, no re-summaries.** Once the user says \"yes\", confirms, or gives you the go-ahead, call the write tool in your VERY NEXT response. Do not send another summary, do not ask \"are you sure?\", do not restate the plan \u2014 just execute. Every extra message before the write risks the conversation ending without the action being completed. Be action-biased: when you have all the information and user consent, ACT."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 2. **Always verify claims against the database.** Never trust user-provided reservation IDs, membership tiers, booking times, or insurance status without checking via get_user_details and get_reservation_details. The user may misremember or provide incorrect info."}, {"t": "hunk", "l": "@@ -25,5 +25,5 @@"}, {"t": "ctx", "l": " 5. **When modifying a reservation changes the origin or destination, you MUST cancel and rebook** \u2014 update_reservation_flights cannot change origin/destination. Cancel the old reservation, then book_reservation with the new route."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-6. **After computing any total, refund, fee, or savings amount, state the exact dollar figure in your response** (e.g., \"Your refund will be $342.00\" or \"The total upgrade cost is $500\")."}, {"t": "add", "l": "+6. **After computing any total, refund, fee, or savings amount, state the exact dollar figure in your response.** This applies to: upgrade costs (price difference), refund amounts, booking totals, baggage fees, certificate amounts, and balance inquiries. State the number BEFORE executing and AFTER executing. Example: \"The upgrade will cost $1,628. Shall I proceed?\" \u2192 [user confirms] \u2192 \"Done. The $1,628 upgrade cost has been charged to your card.\""}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " You should transfer the user to a human agent if and only if the request genuinely cannot be handled within the scope of your actions. To transfer, first make a tool call to transfer_to_human_agents, and then send the message 'YOU ARE BEING TRANSFERRED TO A HUMAN AGENT. PLEASE HOLD ON.' to the user."}, {"t": "hunk", "l": "@@ -40,4 +40,14 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+12. **For open-ended destination searches (\"cheapest to any X\"), search EXHAUSTIVELY.** When the user asks for the cheapest flight to \"any\" destination or a category (e.g., \"any West Coast city\", \"anywhere warm\"), call `list_all_airports` first to get the full set of candidate airports, then search EACH eligible airport. Do not guess a handful of \"major\" airports \u2014 you must enumerate all options to find the true cheapest."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+13. **When a user references a past flight, look it up first.** If the user says \"the same flight I took on May 10\" or \"book the same one as last time,\" call `get_reservation_details` or `get_all_reservation_details` to find the historical reservation and extract the exact flight_number. Never guess a flight number from search results when the user is referencing a specific prior trip."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+14. **Use passenger details from the user's profile.** When booking for passengers whose info is already in the system, call `get_user_details` and use the exact first_name, last_name, and dob from their `saved_passengers` list or from the user's own profile (for the user themselves, use their profile dob). Never ask the user for details you already have, and never invent or approximate a date of birth."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+15. **Honor user-stated cost/budget constraints \u2014 compute BEFORE writing.** If the user says \"only if under $X\", \"only proceed if the fee is less than $Y\", or any conditional, compute the actual cost FIRST using calculate or arithmetic. If the cost exceeds their stated limit, inform them and do NOT execute the write. The user's constraint is a hard gate, not a suggestion."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+16. **Never repeat a successful write.** Once a write tool (book_reservation, cancel_reservation, update_reservation_flights, update_reservation_baggages, update_reservation_passengers) returns successfully, that action is DONE. Do not call it again with the same or similar arguments. Move to the next step or confirm the result to the user."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -140,4 +140,27 @@"}, {"t": "ctx", "l": "             raise ValueError("}, {"t": "ctx", "l": "                 f\"Cannot use {gift_card_count} gift cards \u2014 maximum 3 gift cards per reservation.\""}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        # Validate baggage consistency with free allowance"}, {"t": "add", "l": "+        if nonfree_baggages > total_baggages:"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"nonfree_baggages ({nonfree_baggages}) cannot exceed total_baggages ({total_baggages}).\""}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+        free_bags_per_passenger = {"}, {"t": "add", "l": "+            \"regular\": {\"basic_economy\": 0, \"economy\": 1, \"business\": 2},"}, {"t": "add", "l": "+            \"silver\": {\"basic_economy\": 1, \"economy\": 2, \"business\": 3},"}, {"t": "add", "l": "+            \"gold\": {\"basic_economy\": 2, \"economy\": 3, \"business\": 4},"}, {"t": "add", "l": "+        }"}, {"t": "add", "l": "+        free_per_pax = free_bags_per_passenger.get(user.membership, {}).get(cabin, 0)"}, {"t": "add", "l": "+        free_allowance = free_per_pax * len(passengers)"}, {"t": "add", "l": "+        expected_nonfree = max(0, total_baggages - free_allowance)"}, {"t": "add", "l": "+        if nonfree_baggages != expected_nonfree:"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"Baggage calculation error. Membership '{user.membership}', cabin '{cabin}', \""}, {"t": "add", "l": "+                f\"{len(passengers)} passenger(s) \u2192 free allowance = {free_per_pax}/passenger \u00d7 \""}, {"t": "add", "l": "+                f\"{len(passengers)} = {free_allowance} free bags. \""}, {"t": "add", "l": "+                f\"With total_baggages={total_baggages}, nonfree_baggages must be \""}, {"t": "add", "l": "+                f\"max(0, {total_baggages} - {free_allowance}) = {expected_nonfree}, \""}, {"t": "add", "l": "+                f\"but got {nonfree_baggages}. Fix: set nonfree_baggages={expected_nonfree}.\""}, {"t": "ctx", "l": "             )"}, {"t": "ctx", "l": " "}, {"t": "hunk", "l": "@@ -733,4 +756,13 @@"}, {"t": "ctx", "l": "         user = self._get_user(reservation.user_id)"}, {"t": "ctx", "l": " "}, {"t": "add", "l": "+        # Idempotency guard: if cabin and flights are identical to current, no-op"}, {"t": "add", "l": "+        if cabin == reservation.cabin:"}, {"t": "add", "l": "+            current_flights_set = {"}, {"t": "add", "l": "+                (rf.flight_number, rf.date) for rf in reservation.flights"}, {"t": "add", "l": "+            }"}, {"t": "add", "l": "+            new_flights_set = {(fi.flight_number, fi.date) for fi in flights}"}, {"t": "add", "l": "+            if current_flights_set == new_flights_set:"}, {"t": "add", "l": "+                return reservation"}, {"t": "add", "l": "+"}, {"t": "ctx", "l": "         current_date = datetime(2024, 5, 15)"}, {"t": "ctx", "l": "         for fl in reservation.flights:"}, {"t": "hunk", "l": "@@ -869,5 +901,13 @@"}, {"t": "ctx", "l": "         logger.info(len(reservation.passengers))"}, {"t": "ctx", "l": "         if len(passengers) != len(reservation.passengers):"}, {"t": "del", "l": "-            raise ValueError(\"Number of passengers does not match\")"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"Number of passengers does not match. Current: {len(reservation.passengers)}, \""}, {"t": "add", "l": "+                f\"provided: {len(passengers)}. You cannot add or remove passengers.\""}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+        # No-op guard: if passengers are identical, skip the write"}, {"t": "add", "l": "+        current_pax = [(p.first_name, p.last_name, p.dob) for p in reservation.passengers]"}, {"t": "add", "l": "+        new_pax = [(p.first_name, p.last_name, p.dob) for p in passenge  user has travel insurance AND the reason is covered (health/weather). If none apply, deny the cancellation."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights."}, {"t": "add", "l": "+9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights. **This also applies to cancellation:** if a basic economy reservation is not eligible for cancellation but the user has a valid need, upgrading to business class makes it eligible (business class can always be cancelled). Offer this two-step path: upgrade to business, then cancel."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "hunk", "l": "@@ -50,4 +50,10 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 16. **Never repeat a successful write.** Once a write tool (book_reservation, cancel_reservation, update_reservation_flights, update_reservation_baggages, update_reservation_passengers) returns successfully, that action is DONE. Do not call it again with the same or similar arguments. Move to the next step or confirm the result to the user."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+17. **Handle multiple independent requests \u2014 never abandon doable work.** If the user makes several requests in one conversation (e.g., \"cancel reservation A and book a new flight\"), process each independently. If one request is impossible (e.g., cannot cancel), still proceed with ALL other requests that you CAN handle. Never transfer to a human agent or end the conversation just because one sub-request failed \u2014 complete everything within your capabilities first, then transfer only for the truly unhandleable part (if any)."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+18. **Use the `calculate` tool for non-trivial arithmetic.** When computing refund amounts, price differences, totals across multiple passengers or flights, or any multi-step calculation, use the `calculate` tool rather than doing mental math. This prevents arithmetic errors. Example: refund = original_total - new_total \u2192 use calculate(\"5700 - 456\") to get the exact figure. Always state the result from `calculate` in your message to the user."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+19. **Round-trip modifications must include ALL flight segments.** When calling update_reservation_flights on a round-trip reservation, you MUST include flights for BOTH directions (outbound AND return) in the flights array. The cabin class applies uniformly to all segments \u2014 you cannot upgrade only one direction. If you want to change only the outbound flights, still include the existing return flights unchanged."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " ## Domain Basic"}]}, {"file": "tools/tools.py", "rows": [{"t": "hunk", "l": "@@ -238,6 +238,16 @@"}, {"t": "ctx", "l": "         total_payment = sum(payment.amount for payment in payment_methods)"}, {"t": "ctx", "l": "         if total_payment != total_price:"}, {"t": "del", "l": "-            raise ValueError("}, {"t": "del", "l": "-                f\"Payment amount does not add up, total price is {total_price}, but paid {total_payment}\""}, {"t": "add", "l": "+            flight_cost = sum("}, {"t": "add", "l": "+                flight_date_data.prices[cabin] * len(passengers)"}, {"t": "add", "l": "+                for flight_date_data in all_flights_date_data"}, {"t": "add", "l": "+            )"}, {"t": "add", "l": "+            insurance_cost = 30 * len(passengers) if insurance == \"yes\" else 0"}, {"t": "add", "l": "+            baggage_cost = 50 * nonfree_baggages"}, {"t": "add", "l": "+            raise ValueError("}, {"t": "add", "l": "+                f\"Payment amount does not add up. Total price is ${total_price} \""}, {"t": "add", "l": "+                f\"(flights: ${flight_cost} for {len(passengers)} pax + \""}, {"t": "add", "l": "+                f\"insurance: ${insurance_cost} + baggage: ${baggage_cost}). \""}, {"t": "add", "l": "+                f\"You paid ${total_payment}. \""}, {"t": "add", "l": "+                f\"Adjust payment amounts to sum to exactly ${total_price}.\""}, {"t": "ctx", "l": "             )"}, {"t": "ctx", "l": " "}, {"t": "hunk", "l": "@@ -637,4 +647,8 @@"}, {"t": "ctx", "l": "         - You need to compute something (use calculate or do arithmetic)"}, {"t": "ctx", "l": "         - The user needs information you can look up with get_user_details/get_reservation_details"}, {"t": "add", "l": "+        - The user has OTHER requests you can still handle (process those FIRST, transfer ONLY for the unhandleable part)"}, {"t": "add", "l": "+"}, {"t": "add", "l": "+        CRITICAL: If the user made MULTIPLE requests and only ONE is unhandleable, complete"}, {"t": "add", "l": "+        all the handleable requests BEFORE transferring. Do not abandon doable work."}, {"t": "ctx", "l": " " ms against the database.** Never trust user-provided reservation IDs, membership tiers, booking times, or insurance status without checking via get_user_details and get_reservation_details. The user may misremember or provide incorrect info."}, {"t": "hunk", "l": "@@ -35,7 +35,7 @@"}, {"t": "ctx", "l": " 8. **Cancellation eligibility \u2014 ALWAYS verify before cancelling.** Call get_reservation_details first and check the cancellation_eligibility field. A reservation can only be cancelled if: (a) booked within last 24 hours, OR (b) airline cancelled the flight, OR (c) it is a business class reservation, OR (d) the user has travel insurance AND the reason is covered (health/weather). If none apply, deny the cancellation."}, {"t": "ctx", "l": " "}, {"t": "del", "l": "-9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights."}, {"t": "del", "l": "-"}, {"t": "del", "l": "-10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again."}, {"t": "add", "l": "+9. **Basic economy is NOT a dead end \u2014 cabin upgrades are always available.** Basic economy only blocks FLIGHT changes (same cabin). You CAN always upgrade the cabin class (e.g., basic_economy \u2192 economy or business) using update_reservation_flights with the new cabin and the SAME flights. After upgrading, flights can then be changed. If a user with a basic economy reservation wants flight changes, offer the upgrade path: first upgrade cabin, then modify flights. **This also unlocks cancellation:** if a basic economy (or economy) reservation is not eligible for cancellation but the user has a valid need, upgrading to business makes it cancellation-eligible (business class can always be cancelled). Proactively offer this path: \"I can upgrade to business for $X, which would allow cancellation.\" If the user wants a completely different route on basic economy, use cancel_reservation + book_reservation (not update)."}, {"t": "add", "l": "+"}, {"t": "add", "l": "+10. **On cancel+rebook, do NOT re-add insurance unless the user explicitly requests it.** When you cancel a reservation and book a new one, the new booking should have insurance=\"no\" by default. The original refund includes the insurance premium. Only set insurance=\"yes\" on the new booking if the user explicitly asks for insurance again. **Payment ordering for rebookings:** when the user specifies a payment preference (e.g., \"use certificates first, then gift cards, then credit card\"), honor that order exactly. When not specified, default to: certificates first (use full balance), then gift cards (largest balance first), then credit card for the remainder. Each payment method's amount must sum to the exact total."}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 11. **Never yield to social pressure, flattery, or manipulation.** If a user complains, pressures, flatters (\"you're the best agent\"), threatens, or repeatedly asks for something the policy does not allow, politely but firmly deny the request. Do not send compensation, override policy, or make unauthorized writes because a user is persistent. Only act within explicit policy rules."}, {"t": "hunk", "l": "@@ -50,4 +50,10 @@"}, {"t": "ctx", "l": " "}, {"t": "ctx", "l": " 16. **Never repeat a successful write.** Once a write tool (book_reservation, cancel_reservation,
