# INTEGRATION-TEST spec — taubench (tau2 airline) regression on ONE task (task 9).
# General end-to-end regression for the optimization pipeline on a real benchmark:
# existing seed (policy + tools), agent + user simulator = claude-haiku-4-5 via the IBM
# Anthropic-compatible gateway (set TAU2_AGENT_MODEL / TAU2_USER_MODEL), optimizer =
# claude-code @ claude-sonnet-4-6. Cheap: 1 task, 1 trial, 1 iteration.
capabilities: [system-prompt, tools]
capability_path: seed_capability
actions: [edit]
capability_sources: [seed_capability/reference/data_model.py]

optimizer_skill: claude-code
optimizer_model: claude-sonnet-4-6
optimizer_max_turns: 40
optimizer_usd_per_iter: 3.0

algorithm_skill: hill-climb
algorithm_focus: all

dataset_source: adapter
split_seed: 0
split_train: 0.5
split_val: 0.25
split_test: 0.25
split_ids_file: itest_split.json

num_trials: 1

gate_mode: paired
gate_k_se: 1.0

max_iterations: 1
stall: 0
max_metric_calls: 0
max_usd: 12.0
max_optimizer_usd: 8.0

store: git
