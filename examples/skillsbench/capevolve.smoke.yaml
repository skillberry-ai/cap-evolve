# SMOKE spec — tiny end-to-end proof: 1 val task, 1 trial, 1 iteration.
# Confirms the full path works (sonnet agent in Docker -> verifier reward -> gate).
# NOT the full run.
capabilities: [skill-package]
capability_path: seed_capability
actions: [edit]
capability_sources: []

optimizer_skill: claude-code
optimizer_model: claude-opus-4-8
optimizer_max_turns: 40
optimizer_usd_per_iter: 3.0
runner_repo_path: ../../vendor/skillsbench

algorithm_skill: hill-climb
algorithm_focus: all

dataset_source: adapter
split_seed: 0
split_train: 0.5
split_val: 0.25
split_test: 0.25
split_ids_file: smoke_split.json

num_trials: 1

gate_mode: paired
gate_k_se: 1.0

max_iterations: 1
stall: 0
max_metric_calls: 0
max_usd: 30.0
max_optimizer_usd: 8.0

store: git
