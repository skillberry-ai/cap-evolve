  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme before render to avoid a flash of the wrong theme. Default: dark.
      (function () {
        try {
          var t = localStorage.getItem("evograph-theme") || "dark";
          document.documentElement.classList.remove("dark", "light");
          document.documentElement.classList.add(t === "light" ? "light" : "dark");
        } catch (e) {}
      })();
    </script>
  </body>
