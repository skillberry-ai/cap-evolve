# ============================================================================
# Integration test — tau2 (airline task 9) end-to-end optimization regression.
# ============================================================================
#
# The general pipeline regression on a real benchmark: agent aws/gpt-oss-120b,
# optimizer Claude Code @ claude-opus-4-8, 3 iterations, via the adapter template.
# Passes when the run COMPLETES and the sealed test does not regress vs baseline
# (with 1 task the gate usually rejects — a legitimate PASS proving the pipeline runs).
#
# For the full reward/latency/cost suite over many curated tasks, see benchmarks.yml.
#
# REAL models / real $ → on-demand only: manual dispatch, or the `integration-test`
# PR label. Needs a SELF-HOSTED runner on the IBM network (VPC gateway) + repo secrets
# ANTHROPIC_BASE_URL / ANTHROPIC_AUTH_TOKEN. See ci/benchmarks/README.md.
# ============================================================================

name: Integration tests

on:
  workflow_dispatch: {}
  pull_request:
    types: [labeled]

jobs:
  tau2:
    name: tau2 (task 9)
    runs-on: [self-hosted, ibm-vpc]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'integration-test'))
    concurrency:
      group: itest-tau2-${{ github.ref }}
      cancel-in-progress: true
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup runner env (tau2)
        run: bash ci/benchmarks/lib/ci_setup.sh tau2
      - name: Run tau2 task-9 end-to-end (agent gpt-oss-120b, optimizer claude-opus-4-8)
        run: |
          set -euo pipefail
          out="$(bash ci/benchmarks/lib/run_task.sh tau2 9 full)"
          echo "$out"
          run_dir="$(printf '%s' "$out" | sed -n 's/^RUN_DIR=//p' | tail -1)"
          "${CAPEVOLVE_PY:-python3}" ci/benchmarks/lib/assert_run.py "$run_dir" --min-iterations 1
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tau2-itest-run
          path: ci/benchmarks/.work/tau2/9/.capevolve/run_full/**
          if-no-files-found: ignore
