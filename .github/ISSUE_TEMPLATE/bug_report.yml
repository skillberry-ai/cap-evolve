name: Bug report
description: Report a defect in agent-capo
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you expected vs. what occurred.
    validations: {required: true}
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps — ideally a tiny adapter + the `acapo check` / `acapo run` output.
    validations: {required: true}
  - type: input
    id: version
    attributes:
      label: agent-capo commit / version
